version: 2

updates:
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "04:00"
      timezone: "Etc/UTC"
    groups:
      github-actions:
        patterns:
          - "*"

  - package-ecosystem: "npm"
    # pnpm owns workspace resolution and the shared lockfile at the repository
    # root. Running Dependabot from member directories makes pnpm reject the
    # update; the root updater still discovers and groups workspace manifests.
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "04:30"
      timezone: "Etc/UTC"
    open-pull-requests-limit: 10
    exclude-paths:
      - "apps/crawler/murmur/**"
      - "apps/murmur-shim/**"
    ignore:
      # TypeScript 7 is blocked by typescript-eslint's stable peer range
      # (<6.1 as of 2026-07-22). Track the deliberate migration in #5866.
      - dependency-name: "typescript"
        update-types:
          - "version-update:semver-major"
      # CI and production run Node 22, while the published MCP package still
      # supports Node 18. Future Node ambient types would expose APIs that are
      # unavailable on both supported runtime boundaries.
      - dependency-name: "@types/node"
        update-types:
          - "version-update:semver-major"
    groups:
      security-updates:
        applies-to: "security-updates"
        patterns:
          - "*"
      next-react:
        applies-to: "version-updates"
        patterns:
          - "next"
          - "@next/*"
          - "react"
          - "react-dom"
      lingui:
        applies-to: "version-updates"
        patterns:
          - "@lingui/*"
      typesense:
        applies-to: "version-updates"
        patterns:
          - "typesense"
      aws-sdk:
        applies-to: "version-updates"
        patterns:
          - "@aws-sdk/*"
      test-tooling:
        applies-to: "version-updates"
        dependency-type: "development"
        patterns:
          - "@testing-library/*"
          - "@vitest/*"
          - "vitest"
      workspace-dependencies:
        applies-to: "version-updates"
        patterns:
          - "*"
        group-by: "dependency-name"

  - package-ecosystem: "uv"
    directory: "/apps/crawler"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "05:00"
      timezone: "Etc/UTC"
    ignore:
      # Dependabot's uv updater currently errors with
      # dependency_file_content_not_changed for this crawler entry before
      # invoking uv; sibling uv projects still receive Pillow updates.
      - dependency-name: "pillow"

  - package-ecosystem: "uv"
    directory: "/apps/crawler/ws-package"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "05:15"
      timezone: "Etc/UTC"

  - package-ecosystem: "uv"
    directory: "/apps/web/script"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "05:30"
      timezone: "Etc/UTC"

  - package-ecosystem: "docker"
    directory: "/apps/web"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "06:00"
      timezone: "Etc/UTC"

  - package-ecosystem: "docker"
    directory: "/apps/crawler"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "06:15"
      timezone: "Etc/UTC"

  - package-ecosystem: "docker-compose"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "06:30"
      timezone: "Etc/UTC"

  - package-ecosystem: "docker-compose"
    directory: "/apps/crawler"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "06:45"
      timezone: "Etc/UTC"
