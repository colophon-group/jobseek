version: 2

updates:
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "04:00"
      timezone: "Etc/UTC"
    groups:
      github-actions:
        patterns:
          - "*"

  - package-ecosystem: "npm"
    # Security alerts are reported against both workspace manifests and the
    # shared lockfile. Keep them in one updater so fixes are generated as an
    # atomic pnpm workspace change instead of one PR per manifest boundary.
    directories:
      - "/"
      - "/apps/trace-viewer"
      - "/apps/web"
      - "/packages/mcp-server"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "04:30"
      timezone: "Etc/UTC"
    open-pull-requests-limit: 10
    exclude-paths:
      - "apps/crawler/murmur/**"
      - "apps/murmur-shim/**"
    groups:
      security-updates:
        applies-to: "security-updates"
        patterns:
          - "*"
      next-react:
        applies-to: "version-updates"
        patterns:
          - "next"
          - "@next/*"
          - "react"
          - "react-dom"
      lingui:
        applies-to: "version-updates"
        patterns:
          - "@lingui/*"
      typesense:
        applies-to: "version-updates"
        patterns:
          - "typesense"
      aws-sdk:
        applies-to: "version-updates"
        patterns:
          - "@aws-sdk/*"
      test-tooling:
        applies-to: "version-updates"
        dependency-type: "development"
        patterns:
          - "@testing-library/*"
          - "@vitest/*"
          - "vitest"
      workspace-dependencies:
        applies-to: "version-updates"
        patterns:
          - "*"
        group-by: "dependency-name"

  - package-ecosystem: "uv"
    directory: "/apps/crawler"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "05:00"
      timezone: "Etc/UTC"
    ignore:
      # Dependabot's uv updater currently errors with
      # dependency_file_content_not_changed for this crawler entry before
      # invoking uv; sibling uv projects still receive Pillow updates.
      - dependency-name: "pillow"

  - package-ecosystem: "uv"
    directory: "/apps/crawler/ws-package"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "05:15"
      timezone: "Etc/UTC"

  - package-ecosystem: "uv"
    directory: "/apps/web/script"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "05:30"
      timezone: "Etc/UTC"

  - package-ecosystem: "docker"
    directory: "/apps/web"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "06:00"
      timezone: "Etc/UTC"

  - package-ecosystem: "docker"
    directory: "/apps/crawler"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "06:15"
      timezone: "Etc/UTC"

  - package-ecosystem: "docker-compose"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "06:30"
      timezone: "Etc/UTC"

  - package-ecosystem: "docker-compose"
    directory: "/apps/crawler"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "06:45"
      timezone: "Etc/UTC"
