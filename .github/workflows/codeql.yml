name: CodeQL

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
    paths-ignore:
      - "**/*.md"
      - "docs/**"
      - ".github/dependabot.yml"
      - ".github/dependabot.yaml"
      - ".github/ISSUE_TEMPLATE/**"
      - ".github/DISCUSSION_TEMPLATE/**"
      - "apps/crawler/data/**"
      - "apps/crawler/traces/**"
      - "apps/crawler/VERSION"
  schedule:
    - cron: "17 3 * * 1"
  workflow_dispatch:
    inputs:
      pr:
        description: "Optional PR number for path-aware bot retry"
        required: false
        type: string

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  changes:
    name: Detect CodeQL changes
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
    outputs:
      codeql: ${{ steps.default.outputs.codeql || steps.manual-pr.outputs.codeql || steps.filter.outputs.codeql }}
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          fetch-depth: 0

      - name: Non-PR CodeQL default
        id: default
        if: github.event_name != 'pull_request' && (github.event_name != 'workflow_dispatch' || github.event.inputs.pr == '')
        run: echo "codeql=true" >> "$GITHUB_OUTPUT"

      - name: Classify manually dispatched PR paths
        id: manual-pr
        if: github.event_name == 'workflow_dispatch' && github.event.inputs.pr != ''
        run: .github/scripts/classify-pr-paths.sh
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
          PR: ${{ github.event.inputs.pr }}

      - name: Detect changed paths
        id: filter
        if: github.event_name == 'pull_request'
        uses: dorny/paths-filter@7b450fff21473bca461d4b92ce414b9d0420d706 # v4.0.2
        with:
          predicate-quantifier: every
          filters: |
            codeql:
              - '**'
              - '!**/*.md'
              - '!docs/**'
              - '!.github/dependabot.yml'
              - '!.github/dependabot.yaml'
              - '!.github/ISSUE_TEMPLATE/**'
              - '!.github/DISCUSSION_TEMPLATE/**'
              - '!apps/crawler/data/**'
              - '!apps/crawler/traces/**'
              - '!apps/crawler/VERSION'

  analyze:
    name: Analyze (${{ matrix.language }})
    needs: changes
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
      packages: read
      security-events: write
    strategy:
      fail-fast: false
      matrix:
        language: [actions, javascript-typescript, python]

    steps:
      - name: Skip CodeQL analysis for non-code PR
        if: needs.changes.outputs.codeql != 'true'
        run: echo "Only non-code paths changed; preserving the required CodeQL status without running analysis."

      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        if: needs.changes.outputs.codeql == 'true'

      - name: Initialize CodeQL
        if: needs.changes.outputs.codeql == 'true'
        uses: github/codeql-action/init@e0647621c2984b5ed2f768cb892365bf2a616ad1 # v4
        with:
          languages: ${{ matrix.language }}
          config-file: ./.github/codeql/codeql-config.yml

      - name: Perform CodeQL Analysis
        if: needs.changes.outputs.codeql == 'true'
        uses: github/codeql-action/analyze@e0647621c2984b5ed2f768cb892365bf2a616ad1 # v4
