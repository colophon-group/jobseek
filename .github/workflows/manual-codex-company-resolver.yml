name: Manual Codex company resolver (API billed)

# Manual-only API-billed fallback for company-request resolver recovery.
# This intentionally has no schedule, push, pull_request, workflow_run, or
# other automatic trigger. A human must provide either one issue number or a
# bounded backlog count below.
on:
  workflow_dispatch:
    inputs:
      issue_number:
        description: "Single company-request issue number. Leave blank only for bounded backlog recovery."
        required: false
        type: string
      backlog_limit:
        description: "Bounded backlog recovery count, 1-5. Leave blank when issue_number is set."
        required: false
        type: string

concurrency:
  group: manual-codex-company-resolver
  cancel-in-progress: false

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  select:
    name: Select explicit bounded targets
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: write
      pull-requests: write
    outputs:
      issues_json: ${{ steps.targets.outputs.issues_json }}
      issues: ${{ steps.targets.outputs.issues }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Validate manual dispatch inputs
        id: targets
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
          ISSUE_NUMBER: ${{ inputs.issue_number }}
          BACKLOG_LIMIT: ${{ inputs.backlog_limit }}
        run: |
          set -euo pipefail

          issue="$(printf '%s' "$ISSUE_NUMBER" | tr -d '[:space:]')"
          backlog="$(printf '%s' "$BACKLOG_LIMIT" | tr -d '[:space:]')"

          if [ -n "$issue" ] && [ -n "$backlog" ]; then
            echo "::error::Provide either issue_number or backlog_limit, not both."
            exit 1
          fi

          if [ -z "$issue" ] && [ -z "$backlog" ]; then
            echo "::error::Manual Codex fallback requires issue_number or bounded backlog_limit."
            exit 1
          fi

          if [ -n "$issue" ]; then
            if ! [[ "$issue" =~ ^[0-9]+$ ]]; then
              echo "::error::issue_number must be numeric."
              exit 1
            fi

            issue_json="$(gh issue view "$issue" --repo "$REPO" --json state,labels)"
            state="$(printf '%s' "$issue_json" | jq -r '.state')"
            has_label="$(printf '%s' "$issue_json" | jq -r '[.labels[].name] | index("company-request") != null')"
            if [ "$state" != "OPEN" ] || [ "$has_label" != "true" ]; then
              echo "::error::issue_number must be an open company-request issue."
              exit 1
            fi

            claim_info="$(gh api "repos/$REPO/issues/$issue/comments" \
              --jq '[.[] | select(.body | startswith("<!-- ws-claim -->")) | {id: .id, created_at: .created_at}] | first // empty' \
              2>/dev/null || echo "")"
            if [ -n "$claim_info" ]; then
              claim_date="$(printf '%s' "$claim_info" | jq -r '.created_at')"
              claim_id="$(printf '%s' "$claim_info" | jq -r '.id')"
              claim_ts="$(date -d "$claim_date" +%s)"
              now_ts="$(date +%s)"
              claim_age_hours=$(( (now_ts - claim_ts) / 3600 ))

              if [ "$claim_age_hours" -lt 24 ]; then
                echo "::error::issue #$issue already has an active ws claim (${claim_age_hours}h old)."
                exit 1
              fi

              echo "Removing stale ws claim on issue #$issue (${claim_age_hours}h old)."
              gh api --method DELETE "repos/$REPO/issues/comments/$claim_id" 2>/dev/null || true
            fi

            matching_prs="$(gh pr list --repo "$REPO" --state open \
              --search "Closes #$issue" \
              --json number,headRefName \
              --jq '[.[] | select((.headRefName | startswith("add-company/")) or (.headRefName | startswith("fix-crawler/")))]')"
            if [ "$(printf '%s' "$matching_prs" | jq 'length')" -gt 0 ]; then
              echo "::error::issue #$issue already has an open resolver PR: $(printf '%s' "$matching_prs" | jq -r 'map("#" + (.number|tostring)) | join(", ")')"
              exit 1
            fi

            gh issue comment "$issue" --repo "$REPO" \
              --body $'<!-- ws-claim -->\nWorking on it via manual Codex fallback' \
              2>/dev/null || true

            echo "issues_json=[\"$issue\"]" >> "$GITHUB_OUTPUT"
            echo "issues=$issue" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if ! [[ "$backlog" =~ ^[0-9]+$ ]]; then
            echo "::error::backlog_limit must be numeric."
            exit 1
          fi

          if [ "$backlog" -lt 1 ] || [ "$backlog" -gt 5 ]; then
            echo "::error::backlog_limit must be between 1 and 5."
            exit 1
          fi

          selected=()
          for _ in $(seq 1 "$backlog"); do
            tmp="$(mktemp)"
            GITHUB_OUTPUT="$tmp" .github/scripts/select-issue.sh
            picked="$(sed -n 's/^selected=//p' "$tmp" | tail -1)"
            rm -f "$tmp"

            if [ -z "$picked" ]; then
              break
            fi

            selected+=("$picked")
          done

          if [ "${#selected[@]}" -eq 0 ]; then
            echo "No eligible company-request issues found."
            echo "issues_json=[]" >> "$GITHUB_OUTPUT"
            echo "issues=" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          json="$(printf '%s\n' "${selected[@]}" | jq -R . | jq -cs .)"
          echo "issues_json=$json" >> "$GITHUB_OUTPUT"
          echo "issues=${selected[*]}" >> "$GITHUB_OUTPUT"

  resolve:
    name: Resolve company request with Codex
    needs: select
    if: needs.select.outputs.issues_json != '[]'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      max-parallel: 1
      matrix:
        issue: ${{ fromJson(needs.select.outputs.issues_json) }}
    permissions:
      contents: write
      issues: write
      pull-requests: write
    steps:
      - name: Check required OpenAI secret
        env:
          TOKEN: ${{ secrets.OPENAI_API_KEY }}
        run: |
          if [ -z "$TOKEN" ]; then
            echo "::error::OPENAI_API_KEY secret is not set."
            exit 1
          fi

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0

      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
        with:
          python-version: "3.13"

      - name: Configure git identity
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Setup crawler deps
        run: |
          python -m pip install --upgrade pip
          python -m pip install uv
          cd apps/crawler
          uv sync

      - name: Run Codex API-billed manual fallback
        id: run_codex
        uses: openai/codex-action@v1
        with:
          openai-api-key: ${{ secrets.OPENAI_API_KEY }}
          prompt-file: .github/codex/company-request-fallback.md
          sandbox: danger-full-access
          output-file: codex-final-${{ matrix.issue }}.md
        env:
          GH_TOKEN: ${{ github.token }}
          WS_FALLBACK_ISSUE: ${{ matrix.issue }}

      - name: Archive ws state for trusted trace upload
        if: always()
        run: |
          mkdir -p trace-artifact
          if [ -d apps/crawler/.workspace ]; then
            tar -czf trace-artifact/ws-state.tgz -C apps/crawler .workspace
          else
            : > trace-artifact/no-workspace
          fi

      - name: Upload ws state artifact
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: ws-trace-state-${{ matrix.issue }}
          path: trace-artifact
          retention-days: 3
          if-no-files-found: error

  upload-trace:
    name: Upload ws trace from trusted checkout
    needs: [select, resolve]
    if: always() && needs.select.outputs.issues_json != '[]'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      max-parallel: 1
      matrix:
        issue: ${{ fromJson(needs.select.outputs.issues_json) }}
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 1

      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
        with:
          python-version: "3.13"

      - name: Setup crawler deps
        run: |
          python -m pip install --upgrade pip
          python -m pip install uv
          cd apps/crawler
          uv sync

      - name: Download ws state artifact
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        continue-on-error: true
        with:
          name: ws-trace-state-${{ matrix.issue }}
          path: trace-artifact

      - name: Restore ws state
        id: restore
        run: |
          if [ ! -f trace-artifact/ws-state.tgz ]; then
            echo "::notice::No ws state artifact found for issue #${{ matrix.issue }}."
            echo "restored=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          tar -xzf trace-artifact/ws-state.tgz -C apps/crawler
          echo "restored=true" >> "$GITHUB_OUTPUT"

      - name: Upload ws trace if available
        if: steps.restore.outputs.restored == 'true'
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          WS_FALLBACK_ISSUE: ${{ matrix.issue }}
        run: |
          if [ -z "${HF_TOKEN:-}" ]; then
            echo "::notice::HF_TOKEN is not set; skipping trace upload."
            exit 0
          fi

          cd apps/crawler
          uv run python - <<'PY'
          import os
          import sys

          from src.workspace.state import list_workspaces
          from src.workspace.trace import upload_trace_to_hf

          issue = os.environ["WS_FALLBACK_ISSUE"]
          matches = [ws.slug for ws in list_workspaces() if str(ws.issue) == issue]
          if not matches:
              print(f"::notice::No ws workspace found for issue #{issue}; skipping trace upload.")
              sys.exit(0)

          for slug in matches:
              try:
                  url = upload_trace_to_hf(slug)
              except Exception as exc:
                  print(f"::warning::Could not upload trace for {slug}: {exc}")
                  continue
              if url:
                  print(f"Uploaded trace for {slug}: {url}")
              else:
                  print(f"::notice::No trace records found for {slug}.")
          PY
