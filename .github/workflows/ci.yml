name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main, murmur-demo]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  changes:
    name: Detect changes
    runs-on: ubuntu-latest
    outputs:
      code: ${{ steps.filter.outputs.code }}
      crawler_code: ${{ steps.filter.outputs.crawler_code }}
      boards_csv: ${{ steps.filter.outputs.boards_csv }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0

      - name: Check for code changes
        id: filter
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "code=true" >> "$GITHUB_OUTPUT"
            echo "crawler_code=false" >> "$GITHUB_OUTPUT"
            echo "boards_csv=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          if [ "${{ github.event_name }}" = "push" ]; then
            FILES=$(git diff --name-only HEAD~1 HEAD 2>/dev/null || echo "force")
          else
            # Use paginated files API — gh pr diff fails on large diffs (>20k lines)
            FILES=$(gh api --paginate "repos/${{ github.repository }}/pulls/${{ github.event.pull_request.number }}/files" --jq '.[].filename' 2>/dev/null || echo "force")
          fi
          CODE=false
          CRAWLER_CODE=false
          BOARDS_CSV=false
          while IFS= read -r f; do
            [ -z "$f" ] && continue
            case "$f" in
              force) CODE=true; CRAWLER_CODE=true ;;
              apps/crawler/data/boards.csv) BOARDS_CSV=true ;;
              apps/crawler/data/*) ;;
              apps/crawler/traces/*) ;;
              apps/crawler/VERSION) ;;
              *.md) ;;
              apps/crawler/*) CODE=true; CRAWLER_CODE=true ;;
              *) CODE=true ;;
            esac
          done <<< "$FILES"
          echo "code=$CODE" >> "$GITHUB_OUTPUT"
          echo "crawler_code=$CRAWLER_CODE" >> "$GITHUB_OUTPUT"
          echo "boards_csv=$BOARDS_CSV" >> "$GITHUB_OUTPUT"
          echo "Code changes detected: $CODE (crawler: $CRAWLER_CODE, boards.csv: $BOARDS_CSV)"
        env:
          GH_TOKEN: ${{ github.token }}

  lint-web:
    name: Lint Web
    needs: changes
    if: needs.changes.outputs.code == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4

      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - run: pnpm lint

  lint-crawler:
    name: Lint Crawler
    needs: changes
    if: needs.changes.outputs.code == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - uses: astral-sh/setup-uv@37802adc94f370d6bfd71619e3f0bf239e1f3b78 # v7

      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
        with:
          python-version: "3.13"

      - run: uv sync --group dev
        working-directory: apps/crawler

      - run: uv run ruff check src/ tests/
        working-directory: apps/crawler

      - run: uv run ruff format --check src/ tests/
        working-directory: apps/crawler

  type-all:
    name: Type All
    needs: changes
    if: needs.changes.outputs.code == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4

      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      # turbo run typecheck has dependsOn: ["^build"], so @jseek/mcp-server
      # is built once and all consumers (apps/web) typecheck against the
      # built declarations. Covers every TS workspace in the monorepo.
      - run: pnpm typecheck

  test-web:
    name: Test Web
    needs: changes
    if: needs.changes.outputs.code == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4

      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - run: pnpm --filter @jseek/mcp-server build

      - run: pnpm --filter @jobseek/web test

  test-shim:
    name: Test Murmur Shim
    needs: changes
    if: needs.changes.outputs.code == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4

      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - run: pnpm --filter @jobseek/murmur-shim test

      - run: pnpm --filter @jobseek/murmur-shim build

      - name: Boundary gate (validateUrl/safeFetch)
        run: bash apps/murmur-shim/scripts/grep-validateurl-boundary.sh

  test-crawler:
    name: Test Crawler
    needs: changes
    if: needs.changes.outputs.code == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - uses: astral-sh/setup-uv@37802adc94f370d6bfd71619e3f0bf239e1f3b78 # v7

      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
        with:
          python-version: "3.13"

      - run: uv sync --group dev
        working-directory: apps/crawler

      - run: uv run pytest tests/ -v
        working-directory: apps/crawler

  ws-package-smoke:
    name: ws-package wheel smoke test
    needs: changes
    if: needs.changes.outputs.crawler_code == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
        with:
          python-version: "3.13"

      - name: Build slim ws-package wheel
        working-directory: apps/crawler/ws-package
        run: |
          python -m pip install --upgrade pip build hatchling
          python -m build --wheel

      - name: Install wheel into clean venv
        run: |
          python -m venv /tmp/ws-smoke
          /tmp/ws-smoke/bin/pip install apps/crawler/ws-package/dist/*.whl

      - name: Import smoke test
        run: |
          /tmp/ws-smoke/bin/python apps/crawler/ws-package/smoketest.py

      - name: ws --help / --version work end-to-end
        run: |
          /tmp/ws-smoke/bin/ws --help
          /tmp/ws-smoke/bin/ws --version

  version-check:
    name: Version bump check
    needs: changes
    if: github.event_name == 'pull_request' && needs.changes.outputs.crawler_code == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0

      - name: Check VERSION increased
        run: |
          PR_VERSION=$(cat apps/crawler/VERSION | tr -d '[:space:]')
          MAIN_VERSION=$(git show origin/main:apps/crawler/VERSION | tr -d '[:space:]')

          IFS='.' read -r pr_major pr_minor pr_patch <<< "$PR_VERSION"
          IFS='.' read -r main_major main_minor main_patch <<< "$MAIN_VERSION"

          pr_num=$((pr_major * 1000000 + pr_minor * 1000 + pr_patch))
          main_num=$((main_major * 1000000 + main_minor * 1000 + main_patch))

          if [ "$pr_num" -gt "$main_num" ]; then
            echo "VERSION bumped: ${MAIN_VERSION} → ${PR_VERSION}"
          else
            echo "::error::apps/crawler/VERSION must be bumped for crawler code changes (main: ${MAIN_VERSION}, PR: ${PR_VERSION})"
            exit 1
          fi

  probe-new-boards:
    name: Probe new/changed boards
    needs: changes
    if: github.event_name == 'pull_request' && needs.changes.outputs.boards_csv == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0

      - uses: astral-sh/setup-uv@37802adc94f370d6bfd71619e3f0bf239e1f3b78 # v7

      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
        with:
          python-version: "3.13"

      - run: uv sync
        working-directory: apps/crawler

      - name: Fetch base ref
        run: git fetch --depth=1 origin ${{ github.base_ref }}

      - name: Probe added/changed boards
        working-directory: apps/crawler
        run: uv run python ../../scripts/probe-new-boards.py --base-ref origin/${{ github.base_ref }}
