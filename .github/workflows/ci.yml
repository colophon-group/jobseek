name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-web:
    name: Lint Web
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - run: pnpm lint

  lint-crawler:
    name: Lint Crawler
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: astral-sh/setup-uv@v7

      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - run: uv sync --group dev
        working-directory: apps/crawler

      - run: uv run ruff check src/ tests/
        working-directory: apps/crawler

      - run: uv run ruff format --check src/ tests/
        working-directory: apps/crawler

  test-web:
    name: Test Web
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - run: pnpm --filter @jobseek/web test

  test-crawler:
    name: Test Crawler
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: astral-sh/setup-uv@v7

      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - run: uv sync --group dev
        working-directory: apps/crawler

      - run: uv run pytest tests/ -v
        working-directory: apps/crawler

  deploy:
    name: Deploy
    needs: [lint-web, lint-crawler, test-web, test-crawler]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    environment: production
    env:
      VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
    defaults:
      run:
        working-directory: apps/web
    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile
        working-directory: .

      - run: pnpm dlx vercel pull --yes --environment=production --token=$VERCEL_TOKEN

      - run: pnpm dlx vercel build --prod --token=$VERCEL_TOKEN

      - run: pnpm dlx vercel deploy --prebuilt --prod --token=$VERCEL_TOKEN

  post-deploy:
    name: Post-Deploy
    needs: [deploy]
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile
        working-directory: apps/web

      - run: pnpm db:migrate
        working-directory: apps/web
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}

      - uses: astral-sh/setup-uv@v7

      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - run: uv sync
        working-directory: apps/crawler

      - run: uv run python -m src.sync
        working-directory: apps/crawler
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
