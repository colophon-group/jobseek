name: Upload company images to R2

on:
  pull_request_target:
    branches: [main]
    types: [opened, reopened, synchronize, ready_for_review]
    paths:
      - "apps/crawler/data/images/**"
  workflow_dispatch:

permissions:
  contents: write
  issues: write
  pull-requests: write

concurrency:
  group: upload-images-${{ github.head_ref }}
  cancel-in-progress: true

jobs:
  upload:
    if: >-
      github.event_name == 'workflow_dispatch'
      || (
        github.event.pull_request.head.repo.full_name == github.repository
        && github.event.pull_request.draft == false
      )
    name: Upload images
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          token: ${{ github.token }}
          fetch-depth: 0

      - name: Prepare trusted scripts and PR branch
        if: github.event_name != 'workflow_dispatch'
        env:
          BRANCH: ${{ github.head_ref }}
        run: |
          set -euo pipefail

          mkdir -p "$RUNNER_TEMP/trusted-scripts"
          cp .github/scripts/label-pr.sh "$RUNNER_TEMP/trusted-scripts/label-pr.sh"
          cp .github/scripts/close-linked-company-request-issues.sh "$RUNNER_TEMP/trusted-scripts/close-linked-company-request-issues.sh"
          chmod +x "$RUNNER_TEMP/trusted-scripts/"*.sh

          git fetch origin main "$BRANCH"
          # The workflow has production R2 secrets. Before running Python,
          # keep code from main and check out only PR-controlled data inputs.
          git checkout "origin/$BRANCH" -- apps/crawler/data

      - name: Capture trusted scripts
        if: github.event_name == 'workflow_dispatch'
        run: |
          set -euo pipefail
          mkdir -p "$RUNNER_TEMP/trusted-scripts"
          cp .github/scripts/label-pr.sh "$RUNNER_TEMP/trusted-scripts/label-pr.sh"
          cp .github/scripts/close-linked-company-request-issues.sh "$RUNNER_TEMP/trusted-scripts/close-linked-company-request-issues.sh"
          chmod +x "$RUNNER_TEMP/trusted-scripts/"*.sh

      - uses: astral-sh/setup-uv@37802adc94f370d6bfd71619e3f0bf239e1f3b78 # v7

      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
        with:
          python-version: "3.13"

      - run: uv sync
        working-directory: apps/crawler

      - name: Upload images to R2
        working-directory: apps/crawler
        run: uv run python -m src.image_sync
        env:
          R2_ENDPOINT_URL: ${{ secrets.R2_ENDPOINT_URL }}
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          R2_BUCKET: ${{ vars.R2_BUCKET }}
          R2_DOMAIN_URL: ${{ vars.R2_DOMAIN_URL }}

      - name: Commit R2 URLs and image cleanup
        env:
          BRANCH: ${{ github.head_ref || github.ref_name }}
        run: |
          set -euo pipefail

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          if git diff --quiet -- apps/crawler/data; then
            echo "No R2 URL or image cleanup changes to commit"
            exit 0
          fi

          if [ "$GITHUB_EVENT_NAME" != "workflow_dispatch" ]; then
            git diff --binary -- apps/crawler/data > "$RUNNER_TEMP/image-sync.patch"
            git checkout -B "$BRANCH" "origin/$BRANCH"
            git apply "$RUNNER_TEMP/image-sync.patch"
          fi

          git add apps/crawler/data/
          git commit -m "Upload images to R2"

          # maybe-auto-merge can rebase/force-push the same PR branch in parallel.
          # Rebase this commit on top of the latest remote branch before pushing.
          git fetch origin "$BRANCH"
          git rebase "origin/$BRANCH"

          # Retry once in case branch moved again between fetch and push.
          git push --force-with-lease origin "HEAD:$BRANCH" || {
            git fetch origin "$BRANCH"
            git rebase "origin/$BRANCH"
            git push --force-with-lease origin "HEAD:$BRANCH"
          }

      - name: Post image preview comment
        if: github.event_name != 'workflow_dispatch'
        continue-on-error: true
        uses: actions/github-script@f28e40c7f34bde8b3046d885e986cb6290c5673b # v7
        with:
          script: |
            const fs = require('fs');
            const csvPath = 'apps/crawler/data/companies.csv';
            const csv = fs.readFileSync(csvPath, 'utf8');
            const lines = csv.trim().split('\n');
            const headers = lines[0].split(',');
            const slugIdx = headers.indexOf('slug');
            const nameIdx = headers.indexOf('name');
            const logoIdx = headers.indexOf('logo_url');
            const iconIdx = headers.indexOf('icon_url');

            // Find companies changed in this PR
            const { execSync } = require('child_process');
            const diff = execSync(
              `git diff origin/main -- ${csvPath}`
            ).toString();

            const addedSlugs = new Set();
            for (const line of diff.split('\n')) {
              if (line.startsWith('+') && !line.startsWith('++')) {
                const fields = line.slice(1).split(',');
                if (fields[slugIdx] && fields[slugIdx] !== 'slug') {
                  addedSlugs.add(fields[slugIdx]);
                }
              }
            }

            if (addedSlugs.size === 0) return;

            // Escape HTML to prevent injection from CSV data
            const esc = (s) => s.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');

            let body = '## Company images\n\n| Company | Full Logo | Minified Logo |\n|---------|-----------|----------------|\n';
            for (const row of lines.slice(1)) {
              const fields = row.split(',');
              const slug = fields[slugIdx];
              if (!addedSlugs.has(slug)) continue;
              const name = esc(fields[nameIdx] || slug);
              const logo = fields[logoIdx];
              const icon = fields[iconIdx];
              const logoCell = logo ? `<img src="${esc(logo)}" height="48">` : '—';
              const iconCell = icon ? `<img src="${esc(icon)}" height="32">` : '—';
              body += `| ${name} | ${logoCell} | ${iconCell} |\n`;
            }

            // Replace previous preview comment
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            for (const c of comments) {
              if (c.user?.login === 'github-actions[bot]' && c.body?.startsWith('## Company images')) {
                await github.rest.issues.deleteComment({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  comment_id: c.id,
                });
              }
            }

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body,
            });

      - name: Label PR
        id: label
        if: github.event_name != 'workflow_dispatch'
        run: "$RUNNER_TEMP/trusted-scripts/label-pr.sh"
        env:
          GH_TOKEN: ${{ github.token }}
          PR: ${{ github.event.pull_request.number }}
          REPO: ${{ github.repository }}

      - name: Enable auto-merge
        id: merge
        if: github.event_name != 'workflow_dispatch' && contains(steps.label.outputs.labels, 'auto-merge')
        run: |
          set -euo pipefail

          # Preferred path: let GitHub auto-merge once requirements are met.
          output=$(gh pr merge "$PR" --repo "$REPO" --auto --rebase 2>&1) && {
            echo "$output"
            merged=$(gh pr view "$PR" --repo "$REPO" --json merged --jq '.merged')
            echo "merged=$merged" >> "$GITHUB_OUTPUT"
            exit 0
          }
          status=$?
          echo "$output"

          # Fallback: some repos don't have branch protection, so --auto is unsupported.
          # In that case, wait for checks to finish and merge directly.
          if echo "$output" | grep -q "Protected branch rules not configured"; then
            # gh pr checks exits non-zero when no checks exist (e.g. push via
            # github.token doesn't trigger workflows). Safe to merge directly.
            gh pr checks "$PR" --repo "$REPO" --watch --fail-fast || true
            gh pr merge "$PR" --repo "$REPO" --rebase
            echo "merged=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "merged=false" >> "$GITHUB_OUTPUT"
          exit "$status"
        env:
          GH_TOKEN: ${{ github.token }}
          PR: ${{ github.event.pull_request.number }}
          REPO: ${{ github.repository }}

      - name: Close linked company-request issues
        if: github.event_name != 'workflow_dispatch' && steps.merge.outputs.merged == 'true'
        run: "$RUNNER_TEMP/trusted-scripts/close-linked-company-request-issues.sh"
        env:
          GH_TOKEN: ${{ github.token }}
          PR: ${{ github.event.pull_request.number }}
          REPO: ${{ github.repository }}
