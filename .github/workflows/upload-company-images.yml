name: Upload company images to R2

on:
  pull_request:
    branches: [main]
    paths:
      - "apps/crawler/data/images/**"
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: upload-images-${{ github.head_ref }}
  cancel-in-progress: true

jobs:
  upload:
    name: Upload images
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.head_ref || github.ref }}
          token: ${{ github.token }}
          fetch-depth: 0

      - uses: astral-sh/setup-uv@v7

      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - run: uv sync
        working-directory: apps/crawler

      - name: Upload images to R2
        working-directory: apps/crawler
        run: uv run python -m src.image_sync
        env:
          R2_ENDPOINT_URL: ${{ secrets.R2_ENDPOINT_URL }}
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          R2_BUCKET: ${{ vars.R2_BUCKET }}
          R2_DOMAIN_URL: ${{ vars.R2_DOMAIN_URL }}

      - name: Commit R2 URLs and image cleanup
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add apps/crawler/data/
          git diff --cached --quiet || git commit -m "Upload images to R2"
          git push

      - name: Post image preview comment
        if: github.event_name == 'pull_request'
        continue-on-error: true
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const csvPath = 'apps/crawler/data/companies.csv';
            const csv = fs.readFileSync(csvPath, 'utf8');
            const lines = csv.trim().split('\n');
            const headers = lines[0].split(',');
            const slugIdx = headers.indexOf('slug');
            const nameIdx = headers.indexOf('name');
            const logoIdx = headers.indexOf('logo_url');
            const iconIdx = headers.indexOf('icon_url');

            // Find companies changed in this PR
            const { execSync } = require('child_process');
            const diff = execSync(
              `git diff origin/main -- ${csvPath}`
            ).toString();

            const addedSlugs = new Set();
            for (const line of diff.split('\n')) {
              if (line.startsWith('+') && !line.startsWith('++')) {
                const fields = line.slice(1).split(',');
                if (fields[slugIdx] && fields[slugIdx] !== 'slug') {
                  addedSlugs.add(fields[slugIdx]);
                }
              }
            }

            if (addedSlugs.size === 0) return;

            let body = '## Company images\n\n| Company | Logo | Icon |\n|---------|------|------|\n';
            for (const row of lines.slice(1)) {
              const fields = row.split(',');
              const slug = fields[slugIdx];
              if (!addedSlugs.has(slug)) continue;
              const name = fields[nameIdx] || slug;
              const logo = fields[logoIdx];
              const icon = fields[iconIdx];
              const logoCell = logo ? `<img src="${logo}" height="48">` : '—';
              const iconCell = icon ? `<img src="${icon}" height="32">` : '—';
              body += `| ${name} | ${logoCell} | ${iconCell} |\n`;
            }

            // Replace previous preview comment
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            for (const c of comments) {
              if (c.user?.login === 'github-actions[bot]' && c.body?.startsWith('## Company images')) {
                await github.rest.issues.deleteComment({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  comment_id: c.id,
                });
              }
            }

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body,
            });

      - name: Label PR
        id: label
        if: github.event_name == 'pull_request'
        run: .github/scripts/label-pr.sh
        env:
          GH_TOKEN: ${{ github.token }}
          PR: ${{ github.event.pull_request.number }}
          REPO: ${{ github.repository }}

      - name: Enable auto-merge
        if: github.event_name == 'pull_request' && contains(steps.label.outputs.labels, 'auto-merge')
        run: gh pr merge "$PR" --repo "$REPO" --auto --rebase
        env:
          GH_TOKEN: ${{ github.token }}
          PR: ${{ github.event.pull_request.number }}
          REPO: ${{ github.repository }}
