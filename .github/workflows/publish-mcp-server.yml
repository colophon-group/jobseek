name: Publish MCP server

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - ".github/workflows/publish-mcp-server.yml"
      - "packages/mcp-server/package.json"

jobs:
  publish:
    runs-on: ubuntu-latest
    environment: production
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: "22"
          registry-url: "https://registry.npmjs.org"

      - uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4

      - name: Install dependencies
        working-directory: packages/mcp-server
        run: pnpm install --frozen-lockfile

      - name: Build
        working-directory: packages/mcp-server
        run: pnpm exec tsc

      - name: Check if version changed
        id: version
        working-directory: packages/mcp-server
        run: |
          LOCAL=$(node -p "require('./package.json').version")
          REMOTE=$(npm view @jseek/mcp-server version 2>/dev/null || echo "0.0.0")
          if [ "$LOCAL" = "$REMOTE" ]; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
            echo "version=$LOCAL" >> "$GITHUB_OUTPUT"
          fi

      - name: Check npm auth token
        if: steps.version.outputs.changed == 'true'
        run: |
          if [ -z "${NPM_TOKEN:-}" ]; then
            echo "NPM_TOKEN is not available. This job expects the secret in the production environment." >&2
            exit 1
          fi
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish to npm
        if: steps.version.outputs.changed == 'true'
        working-directory: packages/mcp-server
        run: npm publish --access public --provenance
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Install mcp-publisher
        if: steps.version.outputs.changed == 'true'
        run: |
          curl -L "https://github.com/modelcontextprotocol/registry/releases/latest/download/mcp-publisher_linux_amd64.tar.gz" | tar xz mcp-publisher
          sudo mv mcp-publisher /usr/local/bin/

      - name: Authenticate with MCP registry
        if: steps.version.outputs.changed == 'true'
        run: mcp-publisher login github-oidc

      - name: Publish to MCP registry
        if: steps.version.outputs.changed == 'true'
        working-directory: packages/mcp-server
        run: mcp-publisher publish
