name: Publish MCP server

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - ".github/workflows/publish-mcp-server.yml"
      - "packages/mcp-server/package.json"
      - "packages/mcp-server/server.json"
      - "packages/mcp-server/src/**"
      - "packages/mcp-server/scripts/**"

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  publish:
    runs-on: ubuntu-latest
    environment: production
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v6

      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: "22"
          registry-url: "https://registry.npmjs.org"
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install dependencies
        working-directory: packages/mcp-server
        run: pnpm install --frozen-lockfile

      - name: Build
        working-directory: packages/mcp-server
        run: pnpm exec tsc

      - name: Check if version changed
        id: version
        working-directory: packages/mcp-server
        run: |
          LOCAL=$(node -p "require('./package.json').version")
          REMOTE=$(npm view @jseek/mcp-server version 2>/dev/null || echo "0.0.0")
          if [ "$LOCAL" = "$REMOTE" ]; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
            echo "version=$LOCAL" >> "$GITHUB_OUTPUT"
          fi

      - name: Check npm auth token
        if: steps.version.outputs.changed == 'true'
        run: |
          if [ -z "${NPM_TOKEN:-}" ]; then
            echo "NPM_TOKEN is not available. This job expects the secret in the production environment." >&2
            exit 1
          fi
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish to npm
        if: steps.version.outputs.changed == 'true'
        working-directory: packages/mcp-server
        run: npm publish --access public --provenance
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Install mcp-publisher
        if: steps.version.outputs.changed == 'true'
        run: |
          curl -L "https://github.com/modelcontextprotocol/registry/releases/latest/download/mcp-publisher_linux_amd64.tar.gz" | tar xz mcp-publisher
          sudo mv mcp-publisher /usr/local/bin/

      - name: Authenticate with MCP registry
        if: steps.version.outputs.changed == 'true'
        run: mcp-publisher login github-oidc

      - name: Publish to MCP registry
        if: steps.version.outputs.changed == 'true'
        working-directory: packages/mcp-server
        run: mcp-publisher publish
