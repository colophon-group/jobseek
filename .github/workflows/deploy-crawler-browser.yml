name: Deploy Crawler (Hetzner)

on:
  push:
    branches: [main]
    paths:
      - 'apps/crawler/**'
      - '.github/workflows/deploy-crawler-browser.yml'

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: production
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Read VERSION
        id: version
        run: echo "version=$(cat apps/crawler/VERSION | tr -d '[:space:]')" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push HTTP image (slim)
        uses: docker/build-push-action@v6
        with:
          context: apps/crawler
          target: http
          platforms: linux/amd64
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/jobseek-crawler-http:latest
            ghcr.io/${{ github.repository_owner }}/jobseek-crawler-http:v${{ steps.version.outputs.version }}
          cache-from: type=gha,scope=crawler-http
          cache-to: type=gha,mode=max,scope=crawler-http

      - name: Build and push R2 drain image (slim)
        uses: docker/build-push-action@v6
        with:
          context: apps/crawler
          target: r2-drain
          platforms: linux/amd64
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/jobseek-crawler-r2-drain:latest
            ghcr.io/${{ github.repository_owner }}/jobseek-crawler-r2-drain:v${{ steps.version.outputs.version }}
          cache-from: type=gha,scope=crawler-r2-drain
          cache-to: type=gha,mode=max,scope=crawler-r2-drain

      - name: Build and push browser image (full)
        uses: docker/build-push-action@v6
        with:
          context: apps/crawler
          target: browser
          platforms: linux/amd64
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/jobseek-crawler-browser:latest
            ghcr.io/${{ github.repository_owner }}/jobseek-crawler-browser:v${{ steps.version.outputs.version }}
          cache-from: type=gha,scope=crawler-browser
          cache-to: type=gha,mode=max,scope=crawler-browser

      - name: Copy deploy script
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.HETZNER_HOST }}
          username: deploy
          key: ${{ secrets.HETZNER_SSH_KEY }}
          source: apps/crawler/deploy.sh
          target: /home/deploy/
          strip_components: 2

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.HETZNER_HOST }}
          username: deploy
          key: ${{ secrets.HETZNER_SSH_KEY }}
          envs: OWNER,DATABASE_URL,UPSTASH_REDIS_REST_URL,UPSTASH_REDIS_REST_TOKEN,R2_ACCESS_KEY_ID,R2_SECRET_ACCESS_KEY,R2_ENDPOINT_URL,R2_DOMAIN_URL,R2_BUCKET
          script: bash /home/deploy/deploy.sh
        env:
          OWNER: ${{ github.repository_owner }}
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          UPSTASH_REDIS_REST_URL: ${{ secrets.UPSTASH_REDIS_REST_URL }}
          UPSTASH_REDIS_REST_TOKEN: ${{ secrets.UPSTASH_REDIS_REST_TOKEN }}
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          R2_ENDPOINT_URL: ${{ secrets.R2_ENDPOINT_URL }}
          R2_DOMAIN_URL: ${{ secrets.R2_DOMAIN_URL }}
          R2_BUCKET: ${{ secrets.R2_BUCKET }}
