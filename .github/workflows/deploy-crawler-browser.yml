name: Deploy Crawler (Hetzner)

on:
  push:
    branches: [main]
    paths:
      - 'apps/crawler/**'
      - '.github/workflows/deploy-crawler-browser.yml'

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: production
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Read VERSION
        id: version
        run: echo "version=$(cat apps/crawler/VERSION | tr -d '[:space:]')" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push HTTP image (slim)
        uses: docker/build-push-action@v6
        with:
          context: apps/crawler
          target: http
          platforms: linux/amd64
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/jobseek-crawler-http:latest
            ghcr.io/${{ github.repository_owner }}/jobseek-crawler-http:v${{ steps.version.outputs.version }}
          cache-from: type=gha,scope=crawler-http
          cache-to: type=gha,mode=max,scope=crawler-http

      - name: Build and push R2 drain image (slim)
        uses: docker/build-push-action@v6
        with:
          context: apps/crawler
          target: r2-drain
          platforms: linux/amd64
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/jobseek-crawler-r2-drain:latest
            ghcr.io/${{ github.repository_owner }}/jobseek-crawler-r2-drain:v${{ steps.version.outputs.version }}
          cache-from: type=gha,scope=crawler-r2-drain
          cache-to: type=gha,mode=max,scope=crawler-r2-drain

      - name: Build and push browser image (full)
        uses: docker/build-push-action@v6
        with:
          context: apps/crawler
          target: browser
          platforms: linux/amd64
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/jobseek-crawler-browser:latest
            ghcr.io/${{ github.repository_owner }}/jobseek-crawler-browser:v${{ steps.version.outputs.version }}
          cache-from: type=gha,scope=crawler-browser
          cache-to: type=gha,mode=max,scope=crawler-browser

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.HETZNER_HOST }}
          username: deploy
          key: ${{ secrets.HETZNER_SSH_KEY }}
          script: |
            OWNER=${{ github.repository_owner }}

            # Write per-worker env files (each gets only the credentials it needs)
            cat > /home/deploy/crawler-common.env <<'EOF'
            DATABASE_URL=${{ secrets.DATABASE_URL }}
            WORKER_ID_PREFIX=hetzner
            LOG_LEVEL=INFO
            CRAWLER_DB_POOL_MAX=10
            EOF

            cat > /home/deploy/crawler-http.env <<'EOF'
            UPSTASH_REDIS_REST_URL=${{ secrets.UPSTASH_REDIS_REST_URL }}
            UPSTASH_REDIS_REST_TOKEN=${{ secrets.UPSTASH_REDIS_REST_TOKEN }}
            EOF

            cat > /home/deploy/crawler-r2.env <<'EOF'
            R2_ACCESS_KEY_ID=${{ secrets.R2_ACCESS_KEY_ID }}
            R2_SECRET_ACCESS_KEY=${{ secrets.R2_SECRET_ACCESS_KEY }}
            R2_ENDPOINT_URL=${{ secrets.R2_ENDPOINT_URL }}
            R2_DOMAIN_URL=${{ secrets.R2_DOMAIN_URL }}
            R2_BUCKET=${{ secrets.R2_BUCKET }}
            EOF

            # Pull all images
            docker pull ghcr.io/$OWNER/jobseek-crawler-http:latest
            docker pull ghcr.io/$OWNER/jobseek-crawler-browser:latest
            docker pull ghcr.io/$OWNER/jobseek-crawler-r2-drain:latest

            # Stop and remove old containers
            docker stop crawler-http crawler-browser crawler-r2-drain 2>/dev/null || true
            docker rm crawler-http crawler-browser crawler-r2-drain 2>/dev/null || true

            docker run -d --name crawler-http \
              --restart unless-stopped \
              --env-file /home/deploy/crawler-common.env \
              --env-file /home/deploy/crawler-http.env \
              --network host --memory=2g --cpus=1.5 \
              -e CRAWLER_MAX_CONCURRENT=20 -e CRAWLER_MAX_BROWSER=0 \
              ghcr.io/$OWNER/jobseek-crawler-http:latest

            docker run -d --name crawler-browser \
              --restart unless-stopped \
              --env-file /home/deploy/crawler-common.env \
              --env-file /home/deploy/crawler-http.env \
              --network host --memory=3g --shm-size=1g --cpus=1.0 \
              -e CRAWLER_MAX_CONCURRENT=0 -e CRAWLER_MAX_BROWSER=2 -e METRICS_PORT=9092 \
              ghcr.io/$OWNER/jobseek-crawler-browser:latest

            docker run -d --name crawler-r2-drain \
              --restart unless-stopped \
              --env-file /home/deploy/crawler-common.env \
              --env-file /home/deploy/crawler-r2.env \
              --network host --memory=256m --cpus=1.0 \
              -e METRICS_PORT=9093 \
              ghcr.io/$OWNER/jobseek-crawler-r2-drain:latest

            docker image prune -f
