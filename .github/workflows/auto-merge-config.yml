name: Auto-merge config PRs

on:
  pull_request:
    types: [labeled]

jobs:
  auto-merge:
    if: github.event.label.name == 'auto-merge'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Verify only data files changed
        id: check
        run: |
          FILES=$(gh pr diff ${{ github.event.pull_request.number }} \
            --repo ${{ github.repository }} --name-only)
          echo "Changed files:"
          echo "$FILES"

          # Check that all changed files are in data/ directory
          NON_DATA=$(echo "$FILES" | grep -v '^apps/crawler/data/' || true)
          if [ -n "$NON_DATA" ]; then
            echo "non_data=true" >> "$GITHUB_OUTPUT"
            echo "::warning::PR modifies files outside data/: $NON_DATA"
          else
            echo "non_data=false" >> "$GITHUB_OUTPUT"
          fi
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Enable auto-merge
        if: steps.check.outputs.non_data == 'false'
        run: |
          gh pr merge ${{ github.event.pull_request.number }} \
            --repo ${{ github.repository }} \
            --auto --squash
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Remove label if non-data files changed
        if: steps.check.outputs.non_data == 'true'
        run: |
          gh pr edit ${{ github.event.pull_request.number }} \
            --repo ${{ github.repository }} \
            --remove-label auto-merge \
            --add-label review-code
          gh pr comment ${{ github.event.pull_request.number }} \
            --repo ${{ github.repository }} \
            --body "Auto-merge disabled: PR modifies files outside \`data/\`. Requires human review."
        env:
          GH_TOKEN: ${{ github.token }}
