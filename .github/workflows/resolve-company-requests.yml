name: Resolve company requests

on:
  schedule:
    - cron: "0 */1 * * *"
  workflow_dispatch:

concurrency:
  group: resolve-company-requests
  cancel-in-progress: false

env:
  BUDGET_PER_5H: 5

jobs:
  resolve:
    runs-on: ubuntu-latest
    if: ${{ vars.ENABLE_COMPANY_RESOLVER != 'false' }}
    steps:
      - name: Check required secrets
        run: |
          if [ -z "$TOKEN" ]; then
            echo "::error::CLAUDE_CODE_OAUTH_TOKEN secret is not set — skipping."
            exit 1
          fi
        env:
          TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}

      - uses: actions/checkout@v4

      - name: Select issue
        id: select
        run: .github/scripts/select-issue.sh
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}

      - name: Check budget
        id: budget
        if: steps.select.outputs.selected != ''
        run: .github/scripts/check-budget.sh
        env:
          GH_TOKEN: ${{ github.token }}
          BUDGET_PER_5H: ${{ env.BUDGET_PER_5H }}

      - uses: anthropics/claude-code-action@v1
        if: >
          steps.select.outputs.selected != '' &&
          steps.budget.outputs.remaining > 0
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          prompt: |
            Resolve issue #${{ steps.select.outputs.selected }} (labeled "company-request").
            Follow the instructions in AGENTS.md to resolve it.

            Setup: cd apps/crawler && uv sync && alias ws='uv run ws'

            Summary of steps (ws new sets the active workspace — omit the slug on all subsequent commands):
            1. Read the user request from the issue body
            2. Validate the request (web research, no crawler tooling):
               a. Check company isn't already in data/companies.csv
               b. Confirm the company exists and is currently operating
               c. Find a public careers page with at least one job listing
               On failure: ws reject --issue ${{ steps.select.outputs.selected }} --reason <key> --message "..."
            3. Claim: ws new <slug> --issue ${{ steps.select.outputs.selected }}
               (checks for existing PRs, creates branch + stub CSV + draft PR, sets active workspace)
            4. Research the company — find name, website, logo, icon, career page URL
            5. Set details: ws set --name "..." --website "..." --logo-url "..." --icon-url "..."
            6. Add board + probe: ws add board <alias> --url <board-url> && ws probe
            7. Select + test monitor: ws select monitor <type> && ws run monitor
               If 0 jobs but validation passed, it's a monitor misconfiguration — debug systematically
            8. For non-API monitors: ws select scraper <type> && ws run scraper
            9. Submit: ws submit --summary "..."
               (validates CSV, commits, pushes, posts crawl stats, marks PR ready, posts transcript)

            Only process this ONE issue. Do not process any others.
          claude_args: "--max-turns 25"
