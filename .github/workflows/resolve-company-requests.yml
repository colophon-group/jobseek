name: Resolve company requests

on:
  schedule:
    - cron: "0 */1 * * *"
  workflow_dispatch:

concurrency:
  group: resolve-company-requests
  cancel-in-progress: false

env:
  BUDGET_PER_5H: 5

permissions:
  contents: write       # push add-company/* branches
  pull-requests: write  # create/update draft PRs, post comments
  issues: write         # comment on issues, add labels, close

jobs:
  resolve:
    runs-on: ubuntu-latest
    if: ${{ vars.ENABLE_COMPANY_RESOLVER != 'false' }}
    steps:
      - name: Check required secrets
        run: |
          if [ -z "$TOKEN" ]; then
            echo "::error::CLAUDE_CODE_OAUTH_TOKEN secret is not set — skipping."
            exit 1
          fi
        env:
          TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Select issue
        id: select
        run: .github/scripts/select-issue.sh
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}

      - name: Check budget
        id: budget
        if: steps.select.outputs.selected != ''
        run: .github/scripts/check-budget.sh
        env:
          GH_TOKEN: ${{ github.token }}
          BUDGET_PER_5H: ${{ env.BUDGET_PER_5H }}

      - name: Setup Node.js
        if: >
          steps.select.outputs.selected != '' &&
          steps.budget.outputs.remaining > 0
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: "22"

      - name: Install Claude Code
        if: >
          steps.select.outputs.selected != '' &&
          steps.budget.outputs.remaining > 0
        run: npm install -g @anthropic-ai/claude-code

      - name: Setup Python and crawler deps
        if: >
          steps.select.outputs.selected != '' &&
          steps.budget.outputs.remaining > 0
        run: |
          pip install uv
          cd apps/crawler && uv sync

      - name: Resolve issue
        if: >
          steps.select.outputs.selected != '' &&
          steps.budget.outputs.remaining > 0
        env:
          CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          GH_TOKEN: ${{ github.token }}
          # Pass the issue number through an env var rather than interpolating
          # ${{ steps.select.outputs.selected }} directly into the run: shell
          # script. Direct interpolation can enable workflow injection if a
          # malicious step output ever contains shell metacharacters.
          ISSUE_NUMBER: ${{ steps.select.outputs.selected }}
        run: |
          # Validate that ISSUE_NUMBER is a positive integer before use.
          if ! [[ "$ISSUE_NUMBER" =~ ^[0-9]+$ ]]; then
            echo "::error::ISSUE_NUMBER is not a valid integer: $ISSUE_NUMBER"
            exit 1
          fi
          cd apps/crawler
          claude --print "Run: ws task --issue ${ISSUE_NUMBER}

          Follow the instructions printed by ws task. The ws tool will guide
          you through the parallel pipeline: pre-verify, create workspace,
          spawn subagents for enrichment/logos/boards, test configs, submit.

          Only process this ONE issue. Do not process any others."
