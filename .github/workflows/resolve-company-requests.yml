name: Resolve company requests

on:
  schedule:
    - cron: "0 */1 * * *"
  workflow_dispatch:

concurrency:
  group: resolve-company-requests
  cancel-in-progress: false

env:
  BUDGET_PER_5H: 5
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

permissions:
  contents: read

jobs:
  resolve:
    runs-on: ubuntu-latest
    if: ${{ vars.ENABLE_COMPANY_RESOLVER != 'false' }}
    permissions:
      contents: write       # push add-company/* branches
      pull-requests: write  # create/update draft PRs, post comments
      issues: write         # comment on issues, add labels, close
    steps:
      - name: Check required secrets
        run: |
          if [ -z "$TOKEN" ]; then
            echo "::error::CLAUDE_CODE_OAUTH_TOKEN secret is not set — skipping."
            exit 1
          fi
        env:
          TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}

      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v6

      - name: Select issue
        id: select
        run: .github/scripts/select-issue.sh
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}

      - name: Check budget
        id: budget
        if: steps.select.outputs.selected != ''
        run: .github/scripts/check-budget.sh
        env:
          GH_TOKEN: ${{ github.token }}
          BUDGET_PER_5H: ${{ env.BUDGET_PER_5H }}

      - name: Setup Node.js
        if: >
          steps.select.outputs.selected != '' &&
          steps.budget.outputs.remaining > 0
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: "22"

      - name: Install Claude Code
        if: >
          steps.select.outputs.selected != '' &&
          steps.budget.outputs.remaining > 0
        run: npm install -g @anthropic-ai/claude-code

      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        if: >
          steps.select.outputs.selected != '' &&
          steps.budget.outputs.remaining > 0
        with:
          python-version: "3.13"

      - name: Setup Python and crawler deps
        if: >
          steps.select.outputs.selected != '' &&
          steps.budget.outputs.remaining > 0
        run: |
          pip install uv
          cd apps/crawler && uv sync

      - name: Resolve issue
        if: >
          steps.select.outputs.selected != '' &&
          steps.budget.outputs.remaining > 0
        env:
          CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          GH_TOKEN: ${{ github.token }}
        run: |
          cd apps/crawler
          claude --print "Run: ws task --issue ${{ steps.select.outputs.selected }}

          Follow the instructions printed by ws task. The ws tool will guide
          you through the parallel pipeline: pre-verify, create workspace,
          spawn subagents for enrichment/logos/boards, test configs, submit.

          Only process this ONE issue. Do not process any others."
