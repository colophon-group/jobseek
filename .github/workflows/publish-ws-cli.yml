name: Publish ws-cli to PyPI

on:
  push:
    branches: [main]
    paths:
      - "apps/crawler/VERSION"

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      id-token: write       # OIDC for trusted publishing
      contents: read        # checkout
      attestations: write   # publish attestations
    environment:
      name: pypi
      url: https://pypi.org/p/jobseek-crawler-setup
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install build tools
        run: pip install hatchling build

      - name: Build package
        working-directory: apps/crawler/ws-package
        run: python -m build --wheel

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: apps/crawler/ws-package/dist/
          verbose: true
