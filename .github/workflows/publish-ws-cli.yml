name: Publish ws-cli to PyPI

on:
  push:
    branches: [main]
    paths:
      - "apps/crawler/VERSION"

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      id-token: write       # OIDC for trusted publishing
      contents: read        # checkout
      attestations: write   # publish attestations
    environment:
      name: pypi
      url: https://pypi.org/p/jobseek-crawler-setup
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
        with:
          python-version: "3.13"

      - name: Install build tools
        run: pip install hatchling build

      - name: Build package
        working-directory: apps/crawler/ws-package
        run: python -m build --wheel

      - name: Smoke test built wheel in clean venv
        run: |
          python -m venv /tmp/ws-smoke
          /tmp/ws-smoke/bin/pip install apps/crawler/ws-package/dist/*.whl
          /tmp/ws-smoke/bin/python apps/crawler/ws-package/smoketest.py
          /tmp/ws-smoke/bin/ws --help
          /tmp/ws-smoke/bin/ws --version

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@ed0c53931b1dc9bd32cbe73a98c7f6766f8a527e # release/v1
        with:
          packages-dir: apps/crawler/ws-package/dist/
          verbose: true
