name: Comment on company request

on:
  issues:
    types: [labeled]

jobs:
  comment:
    runs-on: ubuntu-latest
    if: github.event.label.name == 'company-request'
    permissions:
      issues: write
    steps:
      - name: Post agent instructions
        env:
          GH_TOKEN: ${{ github.token }}
          ISSUE: ${{ github.event.issue.number }}
          REPO: ${{ github.repository }}
        run: |
          gh issue comment "$ISSUE" -R "$REPO" --body "**Agent instructions:** follow [AGENTS.md](https://github.com/$REPO/blob/main/AGENTS.md#how-to-add-a-company) to resolve this issue."
