name: Sync CSV data

on:
  push:
    branches: [main]
    paths:
      - 'apps/crawler/data/*.csv'
  workflow_dispatch:

concurrency:
  group: crawler-production-sync
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  sync:
    runs-on: ubuntu-latest
    environment: production

    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          sparse-checkout: apps/crawler/data

      - name: Copy CSV files to Hetzner
        uses: appleboy/scp-action@ff85246acaad7bdce478db94a363cd2bf7c90345 # v1.0.0
        with:
          host: ${{ secrets.HETZNER_HOST }}
          username: deploy
          key: ${{ secrets.HETZNER_SSH_KEY }}
          source: apps/crawler/data/
          target: /home/deploy/csv-overlay/
          strip_components: 3

      - name: Run sync via SSH
        uses: appleboy/ssh-action@0ff4204d59e8e51228ff73bce53f80d53301dee2 # v1
        with:
          host: ${{ secrets.HETZNER_HOST }}
          username: deploy
          key: ${{ secrets.HETZNER_SSH_KEY }}
          envs: GITHUB_SHA
          command_timeout: 1h
          script: |
            set -euo pipefail
            NAME="crawler-csv-data-sync-$(date -u +%Y%m%dT%H%M%SZ)"
            tag="$(grep -E '^CRAWLER_IMAGE_TAG=' /home/deploy/.env 2>/dev/null | tail -n1 | cut -d= -f2- || true)"
            tag="${tag:-latest}"
            /usr/local/sbin/jobseek-maintenance oneoff \
              --operation csv-data-sync \
              --issue 2623 \
              --revision "$GITHUB_SHA" \
              --budget-seconds 1800 \
              --lock-timeout-seconds 900 \
              -- \
              docker run --rm \
                --name "$NAME" \
              --env-file /home/deploy/.env \
              --network host \
              -v /home/deploy/csv-overlay:/app/data \
              "ghcr.io/colophon-group/jobseek-crawler:${tag}" \
              uv run --no-sync crawler sync
