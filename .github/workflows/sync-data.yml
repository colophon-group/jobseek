name: Sync data to DB

on:
  push:
    branches: [main]
    paths:
      - "apps/crawler/data/companies.csv"
      - "apps/crawler/data/boards.csv"
  workflow_dispatch:

concurrency:
  group: sync-csv
  cancel-in-progress: false

jobs:
  sync:
    name: Sync
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v6

      - uses: astral-sh/setup-uv@v7

      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile
        working-directory: apps/web

      - run: pnpm db:migrate
        working-directory: apps/web
        env:
          DATABASE_URL_UNPOOLED: ${{ secrets.DATABASE_URL_UNPOOLED || secrets.DATABASE_URL }}
          DATABASE_URL: ${{ secrets.DATABASE_URL_UNPOOLED || secrets.DATABASE_URL }}

      - run: uv sync
        working-directory: apps/crawler

      - run: uv run python -m src.sync
        working-directory: apps/crawler
        env:
          DATABASE_URL_UNPOOLED: ${{ secrets.DATABASE_URL_UNPOOLED || secrets.DATABASE_URL }}
          DATABASE_URL: ${{ secrets.DATABASE_URL_UNPOOLED || secrets.DATABASE_URL }}
