<!DOCTYPE html><html><head><title>Neura Job</title><script type="application/ld+json">{"@context": "https://schema.org", "@type": "JobPosting", "title": "Manager Ecosystem Integration & Certification (Human)", "description": "\u00a0\\n\\n<strong>Your mission &amp; challenges</strong>\n<p>As the Manager Ecosystem Integration &amp; Certification, you play a key role in shaping our NeuraVerse into an intelligent, connected, and high-quality ecosystem. You ensure that partner solutions \u2013 from hardware to software \u2013 are technically integrated, validated, and certified to perfection. In this role, you work closely with Engineering, AI, Quality Management, and Product teams to ensure that every integration meets our highest technological and quality standards.</p>\n<p>You bring structure, precision, and innovative thinking together: You coordinate integration and certification processes, define standards, and create the technical foundations that enable partners to successfully integrate their solutions into the NeuraVerse. At the same time, you actively drive the evolution of our integration and quality guidelines, ensuring that our ecosystem sets benchmarks in reliability, performance, and compatibility.</p>\n<p>Your main tasks include:</p>\n<ul>\n <li>Technically integrate external partner hardware and software components into the NeuraVerse</li>\n <li>Define, develop, and ensure adherence to integration, testing, and quality standards</li>\n <li>Manage and document testing, certification, and approval processes</li>\n <li>Collaborate closely with R&amp;D, AI, Product Management, and Quality teams on system validation</li>\n <li>Support partners with testing, data integration, and compliance requirements</li>\n <li>Continuously improve guidelines and processes for integration, quality, and approvals</li>\n</ul>\\n\\n\\n\u00a0\\n\\n<strong>What we can look forward to\u00a0</strong>\n<ul>\n <li>Completed degree in Engineering, Computer Science, Robotics, or a co
