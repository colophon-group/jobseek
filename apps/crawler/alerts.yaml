# Prometheus alert rules for the jobseek crawler.
#
# Source of truth for the alerts described in #2703. Pushed to
# Grafana Cloud Mimir via the rule API or `mimirtool`; not auto-applied
# from this file. Operator workflow:
#
#   mimirtool rules load apps/crawler/alerts.yaml \
#     --address="$MIMIR_URL" \
#     --id="$MIMIR_TENANT" \
#     --key="$MIMIR_KEY"
#
# (Equivalent to the manual Grafana-Cloud-Alerting "import from Prometheus
# YAML" flow, which works as a fallback if mimirtool isn't available.)
#
# Severity convention:
#   - severity=page  -> route to phone/SMS, on-call worth waking up
#   - severity=email -> route to low-urgency channel, fix in business hours
#
# Each alert's `for:` is sized to debounce deploy-time flapping.
# `runbook` annotations link to the operator playbook for the failure
# class. See docs/14-error-review-routine.md for the broader incident
# response routine.

groups:
  - name: jobseek_crawler_reliability
    interval: 30s
    rules:

      # --- PAGE ----------------------------------------------------

      # Catches the failure mode that took the box dark for 15h on
      # 2026-04-25: Alloy itself stopped, so no metrics reached
      # Grafana Cloud at all. The `up{}` series is synthesized by the
      # scraper, so its absence directly maps to "scrape pipeline
      # broken" — which is exactly what we want to page on.
      - alert: NoMetricsFromCrawler
        expr: absent(up{job="crawler"})
        for: 5m
        labels:
          severity: page
          service: crawler
        annotations:
          summary: "No metrics from any crawler scrape target"
          description: |
            No `up{job="crawler"}` samples for >5m. Either Alloy has
            stopped on the worker box, all containers exited, or
            remote_write to Grafana Cloud is failing. SSH to the box
            and check `docker ps`.
          runbook: |
            ssh -i ~/.ssh/hetzner_deploy root@$CRAWLER_BROWSER_IPv4
            docker ps -a --format "{{.Names}}|{{.Status}}"
            # If everything is exited: `cd /home/deploy && docker compose up -d`

      # Hard-outage prevention. Postgres halts when its data volume
      # fills (see project_postgres_machine memory). Crawler box also
      # holds Redis state on `/` and the Typesense data dir; both
      # warrant a hard alert before they become unrecoverable.
      - alert: DiskNearFull
        expr: |
          node_filesystem_avail_bytes{job="integrations/unix",mountpoint=~"/|/mnt/.*"}
            / node_filesystem_size_bytes{job="integrations/unix",mountpoint=~"/|/mnt/.*"}
            < 0.10
        for: 15m
        labels:
          severity: page
          service: crawler
        annotations:
          summary: "Disk <10% free on {{ $labels.instance }} {{ $labels.mountpoint }}"
          description: |
            Filesystem `{{ $labels.mountpoint }}` on `{{ $labels.instance }}`
            is below 10% available. Postgres halts when its data dir
            fills; the crawler box stops claiming work when Redis can't
            persist. Investigate before the next deploy.

      # Redis runs with `--maxmemory 1gb --maxmemory-policy noeviction`
      # (apps/crawler/docker-compose.yml). Pressure → write stalls,
      # which silently drops queue work. Redis exporter is added to
      # alloy.river in the same PR as this alert.
      - alert: RedisMemoryPressure
        expr: redis_memory_used_bytes / redis_memory_max_bytes > 0.9
        for: 10m
        labels:
          severity: page
          service: crawler
        annotations:
          summary: "Redis memory >90% on crawler box"
          description: |
            Redis memory usage above 90% of `maxmemory` for >10m.
            Policy is `noeviction`, so writes will stall when full.
            Investigate queue backlog; consider `crawler sync` to
            reseed if state is stale, or scale `maxmemory` up.

      # Catches the failure mode from #3169: a worker container is
      # alive (so `up{job="crawler"}` stays 1 and NoMetricsFromCrawler
      # does NOT fire) but its claim/dispatch loop is stuck — a
      # Playwright-internal deadlock, an unawaited scraper hang, or a
      # similar process-level wedge. `worker_heartbeat_ts` is updated
      # at the top of every loop iteration in
      # `src/workers/pipeline.py`; healthy workers tick every few
      # seconds. 10 minutes is conservative — it sits well above
      # normal monitor-run latency, so a single long board doesn't
      # page. Tighten if it turns out to be too quiet.
      #
      # `max by (worker_id)` collapses across `instance` so a worker
      # restart on a different container doesn't double-page; the
      # worker_id label is the stable identity within a container.
      - alert: WorkerStuck
        expr: time() - max by (worker_id) (crawler_worker_heartbeat_timestamp_seconds) > 600
        for: 5m
        labels:
          severity: page
          service: crawler
        annotations:
          summary: "Crawler worker {{ $labels.worker_id }} heartbeat stale for >10 min"
          description: |
            Worker {{ $labels.worker_id }} hasn't updated heartbeat in
            >10 minutes. Process may be stuck in a scraper deadlock,
            Playwright internal hang, or similar. Container is likely
            'up' but doing no work. SSH to the crawler box and inspect;
            restart container if needed.
          runbook: |
            ssh -i ~/.ssh/hetzner_deploy root@$CRAWLER_BROWSER_IPv4
            # Identify the wedged container by metrics port:
            docker ps --format "{{.Names}}" | xargs -I {} sh -c \
              'echo "=== {} ==="; docker exec {} ps -ef 2>/dev/null | head -5'
            # Restart the stuck worker. Re-claim is automatic via the
            # reaper (#3173) — inflight tasks come back to the queue.
            docker restart <worker-name>

      # Catches the failure mode from #3167: an ephemeral cron run
      # (refresh-typesense every 4h, plus operator-triggered
      # backfill-typesense) stops succeeding silently. The wrapping
      # GitHub Actions workflow may also start failing for an
      # unrelated reason, suppressing the workflow-failure email.
      # `crawler_cron_last_run_ts` is pushed to Pushgateway at the
      # end of every run by `src/cron_metrics.py`; the series
      # persists between runs (Pushgateway PUT semantics) so its
      # last value goes stale when the cron stops reporting.
      # >6h since last report covers the worst case (4h cadence +
      # a missed cycle), and the 1h `for:` debounces a single late
      # run that's still in flight on a slow runner.
      #
      # NOTE: this alert is silently inactive until
      # `CRAWLER_PUSHGATEWAY_URL` is wired into the runtime env of
      # the cron container (see PR body for the operator follow-up).
      # Without it, `_push_metrics` is a no-op and the series is
      # never created. `absent()` would page on that missing state,
      # but until the Pushgateway is reachable that would be noise —
      # so this alert relies on the series existing once, then
      # going stale.
      - alert: CronJobMissing
        expr: time() - max by (cron_job) (crawler_cron_last_run_ts) > 6 * 60 * 60
        for: 1h
        labels:
          severity: page
          service: crawler
        annotations:
          summary: "Cron job {{ $labels.cron_job }} hasn't reported in >6h"
          description: |
            `crawler_cron_last_run_ts{cron_job="{{ $labels.cron_job }}"}`
            is more than 6 hours stale. The scheduled run stopped
            completing — either the GitHub Actions workflow is
            failing, the SSH dispatch to the Hetzner host failed,
            the container started but its body raised before reaching
            `cron.complete`, or Pushgateway is unreachable from the
            cron runtime. Watchlist counts and Typesense facet
            totals go stale fleet-wide while this is down.
          runbook: |
            # 1. Check the scheduled-maintenance workflow run history
            gh run list --repo colophon-group/jobseek \
              --workflow=crawler-scheduled-maintenance.yml --limit 5
            # 2. SSH to the box and inspect recent cron logs
            ssh -i ~/.ssh/hetzner_deploy root@$CRAWLER_BROWSER_IPv4
            docker ps -a --format "{{.Names}}|{{.Status}}" | grep crawler-refresh-typesense
            # 3. Re-run manually to confirm fix:
            gh workflow run crawler-scheduled-maintenance.yml \
              --repo colophon-group/jobseek

      # --- EMAIL ---------------------------------------------------

      # Companion to CronJobMissing. The cron is reporting on
      # schedule but the most recent run failed (the body raised
      # inside `async with cron_run(...)`). Email severity (not
      # page) because the next scheduled cycle will retry; only a
      # sustained streak warrants on-call attention, which
      # CronJobMissing catches by the 6h staleness threshold once
      # consecutive failures stop emitting fresh `last_run_ts`
      # samples... except they don't — `_push_metrics` is called
      # in BOTH the success and failure branches, so `last_run_ts`
      # advances even on failure. That's deliberate: it separates
      # "this job is dead" (CronJobMissing) from "this job is
      # running but broken" (CronJobFailing).
      #
      # 10m `for:` debounces single transient failures (Supabase
      # blip, Typesense restart) — the next run usually recovers.
      - alert: CronJobFailing
        expr: crawler_cron_last_run_status == 0
        for: 10m
        labels:
          severity: email
          service: crawler
        annotations:
          summary: "Cron job {{ $labels.cron_job }} reported failure on last run"
          description: |
            `crawler_cron_last_run_status{cron_job="{{ $labels.cron_job }}"}`
            is 0, meaning the most recent run raised an exception
            inside `cron_run()`. The next scheduled cycle will
            retry — if this clears, no action needed. If it
            persists, the underlying body is broken (Typesense
            outage, schema mismatch, Postgres unreachable from the
            cron container, etc.). Loki carries the failure
            details under `event="cron.complete"` with
            `status="failure"`.

      # Dead-letter entries mean the inflight reaper gave up after
      # repeated expired leases for the same task. This is usually a
      # poison task, worker crash loop, or lease TTL mismatch. Email
      # severity because the fleet can keep processing other work, but
      # the parked task will never self-heal without operator review.
      - alert: DeadletterQueueNotEmpty
        expr: max by (wtype) (crawler_inflight_deadletter_depth) > 0
        for: 1h
        labels:
          severity: email
          service: crawler
        annotations:
          summary: "Crawler dead-letter queue {{ $labels.wtype }} is non-empty"
          description: |
            `crawler_inflight_deadletter_depth{wtype="{{ $labels.wtype }}"}`
            has been nonzero for more than 1 hour. The inflight reaper
            moved one or more tasks to `deadletter:{{ $labels.wtype }}`
            after repeated expired leases. Inspect the task descriptors
            before removing anything from Redis.
          runbook: |
            ssh -i ~/.ssh/hetzner_deploy root@$CRAWLER_BROWSER_IPv4
            docker exec deploy-redis-1 redis-cli ZCARD deadletter:{{ $labels.wtype }}
            docker exec deploy-redis-1 redis-cli ZRANGE deadletter:{{ $labels.wtype }} 0 -1 WITHSCORES
            # Members are "task_type|domain|task_id". Check recent logs
            # for the affected task and reaper outcomes before draining:
            #   {container=~"worker-.*|browser-.*"} |= "pipeline.reaper.swept"
            # After the root cause is fixed, re-enqueue through the
            # normal crawler path or remove the reviewed member:
            docker exec deploy-redis-1 redis-cli ZREM deadletter:{{ $labels.wtype }} '<member>'

      # Catches "exporter container alive but stuck on a Supabase
      # write" — a partial-failure mode that does not trigger
      # NoMetricsFromCrawler. Threshold is 10 expected flush cycles
      # at the natural cadence (<60s p95), with a 5m debounce for
      # transient network blips.
      - alert: ExporterStale
        expr: time() - crawler_exporter_last_flush_ts > 900
        for: 5m
        labels:
          severity: email
          service: crawler
        annotations:
          summary: "Exporter has not flushed in >15m"
          description: |
            `crawler_exporter_last_flush_ts` is more than 15 minutes
            stale. The exporter container is up (otherwise
            NoMetricsFromCrawler would fire) but its flush loop is
            stuck — usually a Supabase write backoff or a Typesense
            outage. Check `docker logs deploy-exporter-1` and the
            Export Lag panel.

      # Catches steady-state degradation: WAF blocking a major board
      # source, Postgres going read-only, etc. >50% failure rate is
      # rare in normal operation; legitimate noisy boards top out
      # around 20%. Long debounce (30m) so single bad batches don't
      # page.
      - alert: TaskFailureRateHigh
        expr: |
          sum(rate(crawler_tasks_total{status="failed"}[15m]))
            / clamp_min(sum(rate(crawler_tasks_total[15m])), 0.001)
            > 0.5
        for: 30m
        labels:
          severity: email
          service: crawler
        annotations:
          summary: "Crawler task failure rate >50% for 30m"
          description: |
            More than half of all crawler tasks are failing.
            Common causes: WAF block on a high-volume board (Akamai/
            DataDome), Postgres connection saturation, or a
            recently-merged scraper that broke a major ATS. See the
            Task Throughput panels and the daily error-review report.

      # Catches the failure mode from the 2026-04-26 NHS spike (#2722):
      # a paginating monitor silently truncates and tombstones live
      # postings via _MARK_GONE_BY_TIMESTAMP. Two conditions must both
      # hold:
      #
      # 1. RATIO: fleet 30m gone rate exceeds 3× the rolling 7-day
      #    median of itself. Subquery `[7d:30m]` evaluates the inner
      #    expression every 30m for the last 7 days, then
      #    quantile_over_time(0.5, ...) picks the median (more robust
      #    to single-cycle outliers polluting the baseline than mean).
      #
      # 2. FLOOR: absolute rate above 5 events/sec averaged over the
      #    same 30m window. Without this, the alert pages 3–7×/day on
      #    quiet weekends — fleet-wide ``gone`` is bursty (cron-cadenced
      #    sweeps), and on a quiet baseline 3× median is easy to cross
      #    on a small board's normal turnover. The floor was chosen
      #    above the observed normal-day p95 (~3–4/s); the NHS spike
      #    peaked above 30/s, well clear of the floor. Verified by
      #    backtest in PR review (#2726).
      #
      # Note the metric carries the ``_total`` suffix at the
      # Prometheus exposition layer (prometheus_client convention),
      # so the query name is ``crawler_monitor_jobs_discovered_total``
      # even though the constructor argument is the same.
      #
      # Fleet-level only — the counter does not carry a ``board_id``
      # label (cardinality concern with ~3000 boards). Per-board
      # alerting is a Loki-LogQL follow-up; the
      # ``batch.monitor.success`` log line includes board_id and gone
      # count and can be aggregated there.
      - alert: DelistingRateSpike
        expr: |
          (
            sum(rate(crawler_monitor_jobs_discovered_total{action="gone"}[30m]))
              >
            3 *
            quantile_over_time(0.5,
              sum(rate(crawler_monitor_jobs_discovered_total{action="gone"}[30m]))[7d:30m]
            )
          )
          and
          sum(rate(crawler_monitor_jobs_discovered_total{action="gone"}[30m])) > 5
        for: 30m
        labels:
          severity: page
          service: crawler
        annotations:
          summary: "Crawler delisting rate >3× 7d median for 30m"
          description: |
            Fleet-wide
            ``crawler_monitor_jobs_discovered_total{action="gone"}`` rate
            is above 3× the 7-day rolling median *and* above 5/s for
            >30 minutes. The 2026-04-26 NHS spike (#2722) is the
            failure mode this catches: a paginating monitor silently
            truncates URL discovery and ``_MARK_GONE_BY_TIMESTAMP``
            tombstones live postings.
          runbook: |
            # 1. Identify the offending board(s) via Loki
            {container=~"worker-.*|browser-.*"} |= "batch.monitor.success"
              | json | gone > 100 | line_format "{{.board_id}} discovered={{.discovered}} gone={{.gone}}"
            # 2. Compare discovered to historical baseline. If `discovered`
            #    is much lower than the recent norm → silent truncation
            #    (#2722 root cause) on a paginating monitor.
            # 3. If only one board is responsible, raise its
            #    `metadata.delist_threshold` (#2725) or set
            #    `metadata.drop_threshold = 0.20` (#2723) for tighter
            #    catch-and-skip behaviour while the underlying monitor
            #    is fixed.

      # The PREVENTIVE signal counterpart to DelistingRateSpike. When
      # the resilience guards from #2723/#2724 catch a truncation, the
      # delisting itself is suppressed (so DelistingRateSpike won't
      # fire). This alert observes the suppression itself, so we
      # notice the underlying monitor bug even when the guards are
      # doing their job.
      #
      # NOTE: ``crawler_monitor_gone_skipped_total`` is introduced by
      # PR #2729. Until that ships the metric series doesn't exist
      # and PromQL returns an empty vector — this alert is silently
      # no-op. After #2729 lands it becomes active automatically; no
      # alert-config change needed.
      #
      # Email severity (not page) because the guards already prevented
      # the user-visible damage; this is "investigate within business
      # hours". Threshold of 5 skips/hour for 1h debounces single
      # noisy boards. Bump down if it turns out to be too quiet.
      - alert: GoneDetectionGuardsFiring
        expr: sum(increase(crawler_monitor_gone_skipped_total[1h])) > 5
        for: 1h
        labels:
          severity: email
          service: crawler
        annotations:
          summary: "Gone-detection guards skipping mark-gone — investigate"
          description: |
            The drop guard (#2723) and/or blast-radius cap (#2724) have
            skipped ``_MARK_GONE_BY_TIMESTAMP`` more than 5 times in the
            last hour. The guards prevented mass false delistings, but
            the underlying monitor bug — usually a paginating monitor
            silently truncating (#2722) — needs fixing.
          runbook: |
            # Find the affected board(s) in Loki:
            {container=~"worker-.*|browser-.*"} |= "batch.monitor.suspect_drop" or "batch.monitor.blast_radius_exceeded"
              | json | line_format "{{.board_id}} reason={{.event}} discovered={{.discovered}} streak={{.streak}}"
            # The board_id pattern + the monitor type from job_board
            # localizes the fix (e.g. dom pagination, sitemap shard
            # fetch, eightfold PCSX truncation).
