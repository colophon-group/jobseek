# Prometheus alert rules for the jobseek crawler.
#
# Source of truth for the alerts described in #2703 and #5926. The
# deploy-hetzner-observability workflow transactionally syncs these groups to
# Grafana Cloud Mimir after all three host collectors pass deployment.
# Manual validation/sync uses the same repo-owned client:
#
#   cd apps/crawler
#   uv run python ../../scripts/sync-grafana-rules.py --dry-run
#
# Severity convention:
#   - severity=critical -> active availability or data-durability risk
#   - severity=high     -> urgent degradation or lost safety control
#   - severity=medium   -> actionable but bounded operational debt
#
# Production alert state is consumed by the daily Hetzner Codex error review,
# which deduplicates and creates/updates GitHub issues. There is intentionally
# no phone/email receiver while that is the owner approved by #5922.
#
# Each alert's `for:` is sized to debounce deploy-time flapping.
# `runbook` annotations link to the operator playbook for the failure
# class. See docs/14-error-review-routine.md for the broader incident
# response routine.

groups:
  - name: jobseek_hetzner_fleet
    interval: 30s
    rules:

      # --- PAGE ----------------------------------------------------

      # Catches the failure mode that took the box dark for 15h on
      # 2026-04-25: Alloy itself stopped, so no metrics reached
      # Grafana Cloud at all. The `up{}` series is synthesized by the
      # scraper, so its absence directly maps to "scrape pipeline
      # broken" — which is exactly what we want to page on.
      - alert: NoMetricsFromCrawler
        expr: absent(up{job="crawler"})
        for: 5m
        labels:
          severity: critical
          service: crawler
          owner: codex-error-review
          route: codex-daily
        annotations:
          summary: "No metrics from any crawler scrape target"
          description: |
            No `up{job="crawler"}` samples for >5m. Either Alloy has
            stopped on the worker box, all containers exited, or
            remote_write to Grafana Cloud is failing. SSH to the box
            and check `docker ps`.
          runbook: https://github.com/colophon-group/jobseek/blob/main/docs/16-hetzner-maintenance.md#fleet-observability

      # Exact expected-host expressions are deliberate: a grouped expression
      # cannot retain a label for a time series that has disappeared.
      - alert: CrawlerHostMetricsMissing
        expr: absent_over_time(up{job="integrations/unix",instance="jobseek-crawler-browser",host_role="crawler"}[5m])
        for: 5m
        labels:
          severity: critical
          service: crawler
          owner: codex-error-review
          route: codex-daily
        annotations:
          summary: "Crawler host metrics are missing"
          description: "The crawler host-level Alloy stream has been absent for at least five minutes."
          runbook: https://github.com/colophon-group/jobseek/blob/main/docs/16-hetzner-maintenance.md#fleet-observability

      - alert: PostgresqlHostMetricsMissing
        expr: absent_over_time(up{job="integrations/unix",instance="jobseek-postgresql",host_role="postgresql"}[5m])
        for: 5m
        labels:
          severity: critical
          service: postgresql
          owner: codex-error-review
          route: codex-daily
        annotations:
          summary: "PostgreSQL host metrics are missing"
          description: "The PostgreSQL host-level Alloy stream has been absent for at least five minutes."
          runbook: https://github.com/colophon-group/jobseek/blob/main/docs/16-hetzner-maintenance.md#fleet-observability

      - alert: TypesenseHostMetricsMissing
        expr: absent_over_time(up{job="integrations/unix",instance="jobseek-typesense",host_role="typesense"}[5m])
        for: 5m
        labels:
          severity: critical
          service: typesense
          owner: codex-error-review
          route: codex-daily
        annotations:
          summary: "Typesense host metrics are missing"
          description: "The Typesense host-level Alloy stream has been absent for at least five minutes."
          runbook: https://github.com/colophon-group/jobseek/blob/main/docs/16-hetzner-maintenance.md#fleet-observability

      - alert: HostObservabilitySamplerStale
        expr: time() - jobseek_host_observability_last_collect_unixtime > 180
        for: 2m
        labels:
          severity: high
          service: fleet-observability
          owner: codex-error-review
          route: codex-daily
        annotations:
          summary: "Host sampler stale on {{ $labels.instance }}"
          description: "The root-owned read-only sampler has not produced a fresh textfile for more than three minutes."
          runbook: https://github.com/colophon-group/jobseek/blob/main/docs/16-hetzner-maintenance.md#fleet-observability

      - alert: HostObservabilityProbeFailed
        expr: jobseek_host_observability_probe_success == 0
        for: 5m
        labels:
          severity: high
          service: fleet-observability
          owner: codex-error-review
          route: codex-daily
        annotations:
          summary: "Host probe {{ $labels.probe }} failed on {{ $labels.instance }}"
          description: "A required read-only host/service probe has failed for five minutes."
          runbook: https://github.com/colophon-group/jobseek/blob/main/docs/16-hetzner-maintenance.md#fleet-observability

      - alert: RequiredHostUnitInactive
        expr: jobseek_host_unit_active == 0
        for: 5m
        labels:
          severity: high
          service: fleet-runtime
          owner: codex-error-review
          route: codex-daily
        annotations:
          summary: "Required unit {{ $labels.unit }} is inactive on {{ $labels.instance }}"
          description: "A required Docker, backup, tunnel, or Codex scheduling unit has remained inactive for five minutes."
          runbook: https://github.com/colophon-group/jobseek/blob/main/docs/16-hetzner-maintenance.md#fleet-observability

      - alert: RequiredContainerUnavailable
        expr: jobseek_container_running == 0
        for: 5m
        labels:
          severity: critical
          service: fleet-runtime
          owner: codex-error-review
          route: codex-daily
        annotations:
          summary: "Required container {{ $labels.container }} is unavailable on {{ $labels.instance }}"
          description: "A required crawler, PostgreSQL, Typesense, or Redis container has remained stopped for five minutes."
          runbook: https://github.com/colophon-group/jobseek/blob/main/docs/16-hetzner-maintenance.md#fleet-observability

      # Hard-outage prevention. Postgres halts when its data volume
      # fills (see project_postgres_machine memory). Crawler box also
      # holds Redis state on `/` and the Typesense data dir; both
      # warrant a hard alert before they become unrecoverable.
      - alert: DiskNearFull
        expr: |
          node_filesystem_avail_bytes{job="integrations/unix",mountpoint=~"/|/mnt/.*"}
            / node_filesystem_size_bytes{job="integrations/unix",mountpoint=~"/|/mnt/.*"}
            < 0.10
        for: 15m
        labels:
          severity: critical
          service: fleet-storage
          owner: codex-error-review
          route: codex-daily
        annotations:
          summary: "Disk <10% free on {{ $labels.instance }} {{ $labels.mountpoint }}"
          description: |
            Filesystem `{{ $labels.mountpoint }}` on `{{ $labels.instance }}`
            is below 10% available. Postgres halts when its data dir
            fills; the crawler box stops claiming work when Redis can't
            persist. Investigate before the next deploy.
          runbook: https://github.com/colophon-group/jobseek/blob/main/docs/16-hetzner-maintenance.md#disk-triage

      - alert: InodesNearFull
        expr: |
          node_filesystem_files_free{job="integrations/unix",fstype!~"tmpfs|overlay"}
            / node_filesystem_files{job="integrations/unix",fstype!~"tmpfs|overlay"}
            < 0.10
        for: 15m
        labels:
          severity: critical
          service: fleet-storage
          owner: codex-error-review
          route: codex-daily
        annotations:
          summary: "Inodes <10% free on {{ $labels.instance }} {{ $labels.mountpoint }}"
          description: "The filesystem is close to inode exhaustion even if byte capacity remains."
          runbook: https://github.com/colophon-group/jobseek/blob/main/docs/16-hetzner-maintenance.md#disk-triage

      - alert: DataBackupFailed
        expr: jobseek_backup_last_attempt_success == 0
        for: 15m
        labels:
          severity: critical
          service: data-backup
          owner: codex-error-review
          route: codex-daily
        annotations:
          summary: "{{ $labels.service }} backup failed on {{ $labels.instance }}"
          description: "The latest application-data backup attempt failed. The native repository is now the only recovery path; investigate immediately and preserve existing artifacts."
          runbook: https://github.com/colophon-group/jobseek/blob/main/docs/19-data-backup-recovery.md#failure-and-removal-gates

      - alert: DataBackupStale
        expr: time() - jobseek_backup_last_success_unixtime > 36 * 60 * 60
        for: 15m
        labels:
          severity: critical
          service: data-backup
          owner: codex-error-review
          route: codex-daily
        annotations:
          summary: "{{ $labels.service }} backup is stale on {{ $labels.instance }}"
          description: "No successful application-data backup has completed within 36 hours."
          runbook: https://github.com/colophon-group/jobseek/blob/main/docs/19-data-backup-recovery.md#failure-and-removal-gates

      - alert: PostgreSQLUnavailable
        expr: jobseek_postgresql_ready == 0
        for: 2m
        labels:
          severity: critical
          service: postgresql
          owner: codex-error-review
          route: codex-daily
        annotations:
          summary: "PostgreSQL readiness failed"
          description: "The local PostgreSQL server is not accepting connections."
          runbook: https://github.com/colophon-group/jobseek/blob/main/docs/16-hetzner-maintenance.md#fleet-observability

      - alert: PostgreSQLConnectionsHigh
        expr: jobseek_postgresql_connections / jobseek_postgresql_max_connections > 0.80
        for: 15m
        labels:
          severity: high
          service: postgresql
          owner: codex-error-review
          route: codex-daily
        annotations:
          summary: "PostgreSQL connections exceed 80%"
          description: "Connection use is approaching max_connections and can block crawler/export operations."
          runbook: https://github.com/colophon-group/jobseek/blob/main/docs/16-hetzner-maintenance.md#fleet-observability

      - alert: PostgreSQLSharedMemoryPressure
        expr: |
          jobseek_postgresql_shared_memory_configured_bytes < 1073741824
            or
          jobseek_postgresql_shared_memory_capacity_bytes < 1073741824
            or
          jobseek_postgresql_shared_memory_available_bytes
            / jobseek_postgresql_shared_memory_capacity_bytes < 0.15
        for: 5m
        labels:
          severity: critical
          service: postgresql
          owner: codex-error-review
          route: codex-daily
        annotations:
          summary: "PostgreSQL shared-memory contract is unsafe"
          description: |
            The PostgreSQL container has regressed below the required 1 GiB
            `/dev/shm` limit or less than 15% of that capacity remains. Parallel
            queries can fail with ENOSPC while the host filesystem is healthy.
          runbook: https://github.com/colophon-group/jobseek/blob/main/docs/16-hetzner-maintenance.md#postgresql-shared-memory

      - alert: PostgreSQLArchiveFailure
        expr: increase(jobseek_postgresql_archive_failed_total[1h]) > 0
        for: 5m
        labels:
          severity: critical
          service: postgresql
          owner: codex-error-review
          route: codex-daily
        annotations:
          summary: "PostgreSQL WAL archive failure"
          description: "pg_stat_archiver recorded a new WAL archive failure in the last hour."
          runbook: https://github.com/colophon-group/jobseek/blob/main/docs/19-data-backup-recovery.md#failure-and-removal-gates

      - alert: TypesenseUnavailable
        expr: jobseek_typesense_healthy == 0
        for: 2m
        labels:
          severity: critical
          service: typesense
          owner: codex-error-review
          route: codex-daily
        annotations:
          summary: "Typesense health check failed"
          description: "The local Typesense health endpoint no longer reports ok."
          runbook: https://github.com/colophon-group/jobseek/blob/main/docs/16-hetzner-maintenance.md#fleet-observability

      - alert: TypesenseTunnelUnavailable
        expr: jobseek_host_unit_active{host_role="typesense",unit="cloudflared.service"} == 0
        for: 5m
        labels:
          severity: critical
          service: typesense-tunnel
          owner: codex-error-review
          route: codex-daily
        annotations:
          summary: "Typesense Cloudflare tunnel is inactive"
          description: "The public Typesense read path is unavailable even if the local process is healthy."
          runbook: https://github.com/colophon-group/jobseek/blob/main/docs/16-hetzner-maintenance.md#fleet-observability

      - alert: HostRebootRequired
        expr: jobseek_host_reboot_required == 1
        for: 24h
        labels:
          severity: medium
          service: fleet-maintenance
          owner: codex-error-review
          route: codex-daily
        annotations:
          summary: "Reboot remains required on {{ $labels.instance }}"
          description: "The host has required a reboot for at least 24 hours; schedule it through the maintenance runbook."
          runbook: https://github.com/colophon-group/jobseek/blob/main/docs/16-hetzner-maintenance.md#fleet-observability

  - name: jobseek_crawler_reliability
    interval: 30s
    rules:

      # Redis runs with `--maxmemory 1gb --maxmemory-policy noeviction`
      # (apps/crawler/docker-compose.yml). Pressure → write stalls,
      # which silently drops queue work. Redis exporter is added to
      # alloy.river in the same PR as this alert.
      - alert: RedisMemoryPressure
        expr: redis_memory_used_bytes / redis_memory_max_bytes > 0.9
        for: 10m
        labels:
          severity: critical
          service: crawler
          owner: codex-error-review
          route: codex-daily
        annotations:
          summary: "Redis memory >90% on crawler box"
          description: |
            Redis memory usage above 90% of `maxmemory` for >10m.
            Policy is `noeviction`, so writes will stall when full.
            Investigate queue backlog; consider `crawler sync` to
            reseed if state is stale, or scale `maxmemory` up.
          runbook: https://github.com/colophon-group/jobseek/blob/main/docs/16-hetzner-maintenance.md#fleet-observability

      # Catches the failure mode from #3169: a worker container is
      # alive (so `up{job="crawler"}` stays 1 and NoMetricsFromCrawler
      # does NOT fire) but its claim/dispatch loop is stuck — a
      # Playwright-internal deadlock, an unawaited scraper hang, or a
      # similar process-level wedge. `worker_heartbeat_ts` is updated
      # at the top of every loop iteration in
      # `src/workers/pipeline.py`; healthy workers tick every few
      # seconds. 10 minutes is conservative — it sits well above
      # normal monitor-run latency, so a single long board doesn't
      # page. Tighten if it turns out to be too quiet.
      #
      # `max by (worker_id)` collapses across `instance` so a worker
      # restart on a different container doesn't double-page; the
      # worker_id label is the stable identity within a container.
      - alert: WorkerStuck
        expr: time() - max by (worker_id) (crawler_worker_heartbeat_timestamp_seconds) > 600
        for: 5m
        labels:
          severity: critical
          service: crawler
          owner: codex-error-review
          route: codex-daily
        annotations:
          summary: "Crawler worker {{ $labels.worker_id }} heartbeat stale for >10 min"
          description: |
            Worker {{ $labels.worker_id }} hasn't updated heartbeat in
            >10 minutes. Process may be stuck in a scraper deadlock,
            Playwright internal hang, or similar. Container is likely
            'up' but doing no work. SSH to the crawler box and inspect;
            restart container if needed.
          runbook: https://github.com/colophon-group/jobseek/blob/main/docs/16-hetzner-maintenance.md#fleet-observability

      # Catches the failure mode from #3167: an ephemeral cron run
      # (refresh-typesense every 4h, plus operator-triggered
      # backfill-typesense) stops succeeding silently. The wrapping
      # GitHub Actions workflow may also start failing for an
      # unrelated reason, suppressing the workflow-failure email.
      # `crawler_cron_last_run_ts` is pushed to Pushgateway at the
      # end of every run by `src/cron_metrics.py`; the series
      # persists between runs (Pushgateway PUT semantics) so its
      # last value goes stale when the cron stops reporting.
      # >6h since last report covers the worst case (4h cadence +
      # a missed cycle), and the 1h `for:` debounces a single late
      # run that's still in flight on a slow runner.
      #
      # NOTE: this alert is silently inactive until
      # `CRAWLER_PUSHGATEWAY_URL` is wired into the runtime env of
      # the cron container (see PR body for the operator follow-up).
      # Without it, `_push_metrics` is a no-op and the series is
      # never created. `absent()` would page on that missing state,
      # but until the Pushgateway is reachable that would be noise —
      # so this alert relies on the series existing once, then
      # going stale.
      - alert: CronJobMissing
        expr: time() - max by (cron_job) (crawler_cron_last_run_ts) > 6 * 60 * 60
        for: 1h
        labels:
          severity: high
          service: crawler
          owner: codex-error-review
          route: codex-daily
        annotations:
          summary: "Cron job {{ $labels.cron_job }} hasn't reported in >6h"
          description: |
            `crawler_cron_last_run_ts{cron_job="{{ $labels.cron_job }}"}`
            is more than 6 hours stale. The scheduled run stopped
            completing — either the GitHub Actions workflow is
            failing, the SSH dispatch to the Hetzner host failed,
            the container started but its body raised before reaching
            `cron.complete`, or Pushgateway is unreachable from the
            cron runtime. Watchlist counts and Typesense facet
            totals go stale fleet-wide while this is down.
          runbook: https://github.com/colophon-group/jobseek/blob/main/docs/16-hetzner-maintenance.md#fleet-observability

      # --- EMAIL ---------------------------------------------------

      # Companion to CronJobMissing. The cron is reporting on
      # schedule but the most recent run failed (the body raised
      # inside `async with cron_run(...)`). Email severity (not
      # page) because the next scheduled cycle will retry; only a
      # sustained streak warrants on-call attention, which
      # CronJobMissing catches by the 6h staleness threshold once
      # consecutive failures stop emitting fresh `last_run_ts`
      # samples... except they don't — `_push_metrics` is called
      # in BOTH the success and failure branches, so `last_run_ts`
      # advances even on failure. That's deliberate: it separates
      # "this job is dead" (CronJobMissing) from "this job is
      # running but broken" (CronJobFailing).
      #
      # 10m `for:` debounces single transient failures (Supabase
      # blip, Typesense restart) — the next run usually recovers.
      - alert: CronJobFailing
        expr: crawler_cron_last_run_status == 0
        for: 10m
        labels:
          severity: high
          service: crawler
          owner: codex-error-review
          route: codex-daily
        annotations:
          summary: "Cron job {{ $labels.cron_job }} reported failure on last run"
          description: |
            `crawler_cron_last_run_status{cron_job="{{ $labels.cron_job }}"}`
            is 0, meaning the most recent run raised an exception
            inside `cron_run()`. The next scheduled cycle will
            retry — if this clears, no action needed. If it
            persists, the underlying body is broken (Typesense
            outage, schema mismatch, Postgres unreachable from the
            cron container, etc.). Loki carries the failure
            details under `event="cron.complete"` with
            `status="failure"`.
          runbook: https://github.com/colophon-group/jobseek/blob/main/docs/16-hetzner-maintenance.md#fleet-observability

      # Dead-letter entries mean the inflight reaper gave up after
      # repeated expired leases for the same task. This is usually a
      # poison task, worker crash loop, or lease TTL mismatch. Email
      # severity because the fleet can keep processing other work, but
      # the parked task will never self-heal without operator review.
      - alert: DeadletterQueueNotEmpty
        expr: max by (wtype) (crawler_inflight_deadletter_depth) > 0
        for: 1h
        labels:
          severity: medium
          service: crawler
          owner: codex-error-review
          route: codex-daily
        annotations:
          summary: "Crawler dead-letter queue {{ $labels.wtype }} is non-empty"
          description: |
            `crawler_inflight_deadletter_depth{wtype="{{ $labels.wtype }}"}`
            has been nonzero for more than 1 hour. The inflight reaper
            moved one or more tasks to `deadletter:{{ $labels.wtype }}`
            after repeated expired leases. Inspect the task descriptors
            before removing anything from Redis.
          runbook: https://github.com/colophon-group/jobseek/blob/main/docs/03-crawler-architecture.md#inflight-leases-and-dead-letter-recovery

      # Catches "exporter container alive but stuck on a Supabase
      # write" — a partial-failure mode that does not trigger
      # NoMetricsFromCrawler. Threshold is 10 expected flush cycles
      # at the natural cadence (<60s p95), with a 5m debounce for
      # transient network blips.
      - alert: ExporterStale
        expr: time() - crawler_exporter_last_flush_ts{instance="exporter"} > 900
        for: 5m
        labels:
          severity: high
          service: crawler
          owner: codex-error-review
          route: codex-daily
        annotations:
          summary: "Exporter has not flushed in >15m"
          description: |
            `crawler_exporter_last_flush_ts` is more than 15 minutes
            stale. The exporter container is up (otherwise
            NoMetricsFromCrawler would fire) but its flush loop is
            stuck — usually a Supabase write backoff or a Typesense
            outage. Check `docker logs deploy-exporter-1` and the
            Export Lag panel.
          runbook: https://github.com/colophon-group/jobseek/blob/main/docs/03-crawler-architecture.md

      # The exporter never waits for a zero-writer gap. A sustained old cutoff
      # means a marked posting-writer transaction is holding back freshness.
      - alert: CdcWriterCutoffDelayed
        expr: max_over_time(crawler_exporter_cdc_cutoff_delay_seconds{instance="exporter"}[5m]) > 120
        for: 1m
        labels:
          severity: high
          service: crawler
          owner: codex-error-review
          route: codex-daily
        annotations:
          summary: "CDC writer floor is delaying export by >120s"
          description: |
            The exporter is progressing with a conservative cutoff more than
            120 seconds behind the database clock. Inspect
            `crawler_exporter_cdc_active_writers`, `pg_stat_activity`, and the
            `cdc_snapshot_cutoff.delayed` event before terminating anything.
          runbook: https://github.com/colophon-group/jobseek/blob/main/docs/03-crawler-architecture.md#commit-safe-posting-cdc

      # A lock that disappeared between the dynamic pg_locks/activity scans is
      # safe and counted separately. This alert is reserved for a marker that
      # remains held without an attributable transaction start; the exporter
      # fails that tick closed rather than advancing either cursor.
      - alert: CdcWriterIdentityUnavailable
        expr: increase(crawler_exporter_cdc_unknown_writers_total{instance="exporter"}[15m]) > 0
        for: 1m
        labels:
          severity: high
          service: crawler
          owner: codex-error-review
          route: codex-daily
        annotations:
          summary: "A CDC writer lock has no attributable transaction start"
          description: |
            The exporter kept both cursors pinned because a shared CDC writer
            marker remained held after recheck without a visible transaction
            start. Inspect `pg_locks`, `pg_stat_activity`, prepared
            transactions, and `cdc_snapshot_cutoff.unknown_writer`; do not
            terminate a backend until its owner and rollback consequence are
            understood.
          runbook: https://github.com/colophon-group/jobseek/blob/main/docs/03-crawler-architecture.md#commit-safe-posting-cdc

      # Reconciliation evidence is persisted in authoritative PostgreSQL and
      # scraped by the PostgreSQL host collector, so exporter recreation can
      # neither reset the schedule nor erase the last outcome.
      - alert: CrossStoreReconciliationSchemaMissing
        expr: jobseek_cross_store_reconciliation_schema_ready != 1
        for: 15m
        labels:
          severity: high
          service: cross-store-reconciliation
          owner: codex-error-review
          route: codex-daily
        annotations:
          summary: "The durable reconciliation schema is unavailable"
          description: "The PostgreSQL host is healthy but the reconciliation state table is absent; verify the crawler Alembic deployment before running repairs."
          runbook: https://github.com/colophon-group/jobseek/blob/main/docs/03-crawler-architecture.md#cross-store-reconciliation

      - alert: CrossStoreReconciliationFailed
        expr: |
          jobseek_cross_store_reconciliation_last_attempt_unixtime > 0
            and on (target)
          jobseek_cross_store_reconciliation_last_attempt_success == 0
        for: 15m
        labels:
          severity: high
          service: cross-store-reconciliation
          owner: codex-error-review
          route: codex-daily
        annotations:
          summary: "{{ $labels.target }} reconciliation failed"
          description: |
            The last bounded reconciliation attempt failed and retained its
            durable partition cursor for a fail-closed retry. Inspect the
            systemd service journal and the persisted target outcome.
          runbook: https://github.com/colophon-group/jobseek/blob/main/docs/03-crawler-architecture.md#cross-store-reconciliation

      - alert: CrossStoreReconciliationStale
        expr: |
          (
            jobseek_cross_store_reconciliation_last_success_unixtime > 0
              and on (target)
            time() - jobseek_cross_store_reconciliation_last_success_unixtime > 108000
          )
          or
          (
            jobseek_cross_store_reconciliation_last_success_unixtime == 0
              and on (target)
            jobseek_cross_store_reconciliation_cycle_started_unixtime > 0
              and on (target)
            time() - jobseek_cross_store_reconciliation_cycle_started_unixtime > 108000
          )
          or
          (
            jobseek_cross_store_reconciliation_last_attempt_unixtime == 0
              and on ()
            jobseek_cross_store_reconciliation_schema_ready == 1
          )
        for: 2h
        labels:
          severity: high
          service: cross-store-reconciliation
          owner: codex-error-review
          route: codex-daily
        annotations:
          summary: "{{ $labels.target }} reconciliation has no fresh full-cycle success"
          description: "No complete verified reconciliation cycle has succeeded within the 30-hour freshness budget."
          runbook: https://github.com/colophon-group/jobseek/blob/main/docs/03-crawler-architecture.md#cross-store-reconciliation

      - alert: CrossStoreReconciliationDrift
        expr: jobseek_cross_store_reconciliation_last_unresolved > 0
        for: 15m
        labels:
          severity: high
          service: cross-store-reconciliation
          owner: codex-error-review
          route: codex-daily
        annotations:
          summary: "{{ $labels.target }} reconciliation retains unresolved drift"
          description: "A deterministic partition found downstream active-state or document-set drift that was not verified as repaired."
          runbook: https://github.com/colophon-group/jobseek/blob/main/docs/03-crawler-architecture.md#cross-store-reconciliation

      - alert: CrossStoreReconciliationRunStuck
        expr: jobseek_cross_store_reconciliation_stuck_runs > 0
        for: 15m
        labels:
          severity: high
          service: cross-store-reconciliation
          owner: codex-error-review
          route: codex-daily
        annotations:
          summary: "A reconciliation run has remained unfinished for over two hours"
          description: "The durable run ledger contains a stale running row; inspect the host timer, container, and database advisory lock before clearing anything."
          runbook: https://github.com/colophon-group/jobseek/blob/main/docs/03-crawler-architecture.md#cross-store-reconciliation

      # Catches steady-state degradation: WAF blocking a major board
      # source, Postgres going read-only, etc. >50% failure rate is
      # rare in normal operation; legitimate noisy boards top out
      # around 20%. Long debounce (30m) so single bad batches don't
      # page.
      - alert: TaskFailureRateHigh
        expr: |
          sum(rate(crawler_tasks_total{status="failed"}[15m]))
            / clamp_min(sum(rate(crawler_tasks_total[15m])), 0.001)
            > 0.5
        for: 30m
        labels:
          severity: high
          service: crawler
          owner: codex-error-review
          route: codex-daily
        annotations:
          summary: "Crawler task failure rate >50% for 30m"
          description: |
            More than half of all crawler tasks are failing.
            Common causes: WAF block on a high-volume board (Akamai/
            DataDome), Postgres connection saturation, or a
            recently-merged scraper that broke a major ATS. See the
            Task Throughput panels and the daily error-review report.
          runbook: https://github.com/colophon-group/jobseek/blob/main/docs/14-error-review-routine.md

      # Shared-origin protection (#3195, #5353, #5706, #5707, #5717). The
      # breaker opens after three failed crawler runs against the same real
      # outbound hostname within ten minutes and defers sibling boards and
      # postings for thirty minutes. Alert once per host incident.
      - alert: UpstreamHostCircuitOpen
        expr: max by (egress_host) (crawler_host_circuit_state) > 0
        for: 5m
        labels:
          severity: medium
          service: crawler
          owner: codex-error-review
          route: codex-daily
        annotations:
          summary: "Crawler upstream-host circuit is open"
          description: |
            Monitor or scrape work for {{ $labels.egress_host }} is being
            deferred before network I/O because several tasks failed against
            the same origin. One half-open probe runs after the stored unblock
            time; sibling tasks stay deferred until that probe completes.
          runbook: https://github.com/colophon-group/jobseek/blob/main/docs/03-crawler-architecture.md

      # Catches the failure mode from the 2026-04-26 NHS spike (#2722):
      # a paginating monitor silently truncates and tombstones live
      # postings via _MARK_GONE_BY_TIMESTAMP. Two conditions must both
      # hold:
      #
      # 1. RATIO: fleet 30m gone rate exceeds 3× the rolling 7-day
      #    median of itself. Subquery `[7d:30m]` evaluates the inner
      #    expression every 30m for the last 7 days, then
      #    quantile_over_time(0.5, ...) picks the median (more robust
      #    to single-cycle outliers polluting the baseline than mean).
      #
      # 2. FLOOR: absolute rate above 5 events/sec averaged over the
      #    same 30m window. Without this, the alert pages 3–7×/day on
      #    quiet weekends — fleet-wide ``gone`` is bursty (cron-cadenced
      #    sweeps), and on a quiet baseline 3× median is easy to cross
      #    on a small board's normal turnover. The floor was chosen
      #    above the observed normal-day p95 (~3–4/s); the NHS spike
      #    peaked above 30/s, well clear of the floor. Verified by
      #    backtest in PR review (#2726).
      #
      # Note the metric carries the ``_total`` suffix at the
      # Prometheus exposition layer (prometheus_client convention),
      # so the query name is ``crawler_monitor_jobs_discovered_total``
      # even though the constructor argument is the same.
      #
      # Fleet-level only — the counter does not carry a ``board_id``
      # label (cardinality concern with ~3000 boards). Per-board
      # alerting is a Loki-LogQL follow-up; the
      # ``batch.monitor.success`` log line includes board_id and gone
      # count and can be aggregated there.
      - alert: DelistingRateSpike
        expr: |
          (
            sum(rate(crawler_monitor_jobs_discovered_total{action="gone"}[30m]))
              >
            3 *
            quantile_over_time(0.5,
              sum(rate(crawler_monitor_jobs_discovered_total{action="gone"}[30m]))[7d:30m]
            )
          )
          and
          sum(rate(crawler_monitor_jobs_discovered_total{action="gone"}[30m])) > 5
        for: 30m
        labels:
          severity: critical
          service: crawler
          owner: codex-error-review
          route: codex-daily
        annotations:
          summary: "Crawler delisting rate >3× 7d median for 30m"
          description: |
            Fleet-wide
            ``crawler_monitor_jobs_discovered_total{action="gone"}`` rate
            is above 3× the 7-day rolling median *and* above 5/s for
            >30 minutes. The 2026-04-26 NHS spike (#2722) is the
            failure mode this catches: a paginating monitor silently
            truncates URL discovery and ``_MARK_GONE_BY_TIMESTAMP``
            tombstones live postings.
          runbook: https://github.com/colophon-group/jobseek/blob/main/docs/14-error-review-routine.md

      # The PREVENTIVE signal counterpart to DelistingRateSpike. When
      # the resilience guards from #2723/#2724 catch a truncation, the
      # delisting itself is suppressed (so DelistingRateSpike won't
      # fire). This alert observes the suppression itself, so we
      # notice the underlying monitor bug even when the guards are
      # doing their job.
      #
      # NOTE: ``crawler_monitor_gone_skipped_total`` is introduced by
      # PR #2729. Until that ships the metric series doesn't exist
      # and PromQL returns an empty vector — this alert is silently
      # no-op. After #2729 lands it becomes active automatically; no
      # alert-config change needed.
      #
      # Email severity (not page) because the guards already prevented
      # the user-visible damage; this is "investigate within business
      # hours". Threshold of 5 skips/hour for 1h debounces single
      # noisy boards. Bump down if it turns out to be too quiet.
      - alert: GoneDetectionGuardsFiring
        expr: sum(increase(crawler_monitor_gone_skipped_total[1h])) > 5
        for: 1h
        labels:
          severity: medium
          service: crawler
          owner: codex-error-review
          route: codex-daily
        annotations:
          summary: "Gone-detection guards skipping mark-gone — investigate"
          description: |
            The drop guard (#2723) and/or blast-radius cap (#2724) have
            skipped ``_MARK_GONE_BY_TIMESTAMP`` more than 5 times in the
            last hour. The guards prevented mass false delistings, but
            the underlying monitor bug — usually a paginating monitor
            silently truncating (#2722) — needs fixing.
          runbook: https://github.com/colophon-group/jobseek/blob/main/docs/14-error-review-routine.md
