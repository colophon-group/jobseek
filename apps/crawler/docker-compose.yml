# docker-compose.yml — Hetzner crawler deployment (worker machine)
#
# All containers use network_mode: host (no bridge network).
# Postgres runs on a separate dedicated machine.
# Redis runs locally on the worker machine.

x-common-env: &common-env
  DATABASE_URL: ${DATABASE_URL}                    # Supabase (exporter writes only)
  LOCAL_DATABASE_URL: ${LOCAL_DATABASE_URL}         # Hetzner Postgres machine
  REDIS_URL: redis://localhost:6379/0
  WORKER_ID_PREFIX: hetzner
  LOG_LEVEL: INFO
  R2_ACCESS_KEY_ID: ${R2_ACCESS_KEY_ID}
  R2_SECRET_ACCESS_KEY: ${R2_SECRET_ACCESS_KEY}
  R2_ENDPOINT_URL: ${R2_ENDPOINT_URL}
  R2_DOMAIN_URL: ${R2_DOMAIN_URL}
  R2_BUCKET: ${R2_BUCKET}
  TYPESENSE_HOST: ${TYPESENSE_HOST}
  TYPESENSE_PORT: ${TYPESENSE_PORT}
  TYPESENSE_PROTOCOL: ${TYPESENSE_PROTOCOL}
  TYPESENSE_ADMIN_KEY: ${TYPESENSE_ADMIN_KEY}
  # Proxy provider — applies to boards with ``"proxy": true`` in their
  # monitor_config / scraper_config (see src/shared/proxy.py). Secrets
  # for idle providers stay set so operators can swap with one env flip.
  PROXY_PROVIDER: ${PROXY_PROVIDER:-none}
  WEBSHARE_PROXY_URL: ${WEBSHARE_PROXY_URL:-}
  DECODO_PROXY_URL: ${DECODO_PROXY_URL:-}

services:
  # -- Redis -------------------------------------------------------
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    network_mode: host
    # Sized for the steady-state scrape backlog, not the initial reseed.
    # ~550k keys at 2026-04-23 used ~373 MB (73% of the old 512 MB cap),
    # nearly triggering noeviction-stalled writes. 1 GB gives headroom
    # while the pipeline drains stale per-domain queues (#2526) and the
    # SuccessFactors URL-canonicalization fix (#2524) cuts cardinality.
    command: redis-server --maxmemory 1gb --maxmemory-policy noeviction --bind 127.0.0.1
    volumes:
      - redis-data:/data
    mem_limit: 1536m
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 3

  # -- Workers (3x HTTP, each on its own metrics port) -------------
  worker-1:
    image: ghcr.io/${OWNER}/jobseek-crawler:latest
    init: true
    restart: unless-stopped
    network_mode: host
    # Give the cli.py SIGTERM handler time to close the Postgres pool
    # under load. Default 10s is too tight; 30s is conservative.
    stop_grace_period: 30s
    command: uv run --no-sync crawler run
    environment:
      <<: *common-env
      METRICS_PORT: "9095"
      DISCOVERY_CONCURRENCY: "30"
      MONITOR_CONCURRENCY: "10"
      CRAWLER_DB_POOL_MAX: "20"
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python -c 'import urllib.request; urllib.request.urlopen(\"http://localhost:9095/\")'"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    mem_limit: 1g
    cpus: 1.0

  worker-2:
    image: ghcr.io/${OWNER}/jobseek-crawler:latest
    init: true
    restart: unless-stopped
    network_mode: host
    stop_grace_period: 30s  # see worker-1 — gives Postgres pool time to drain
    command: uv run --no-sync crawler run
    environment:
      <<: *common-env
      METRICS_PORT: "9096"
      DISCOVERY_CONCURRENCY: "30"
      MONITOR_CONCURRENCY: "10"
      CRAWLER_DB_POOL_MAX: "20"
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python -c 'import urllib.request; urllib.request.urlopen(\"http://localhost:9096/\")'"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    mem_limit: 1g
    cpus: 1.0

  worker-3:
    image: ghcr.io/${OWNER}/jobseek-crawler:latest
    init: true
    restart: unless-stopped
    network_mode: host
    stop_grace_period: 30s  # see worker-1 — gives Postgres pool time to drain
    command: uv run --no-sync crawler run
    environment:
      <<: *common-env
      METRICS_PORT: "9097"
      DISCOVERY_CONCURRENCY: "30"
      MONITOR_CONCURRENCY: "10"
      CRAWLER_DB_POOL_MAX: "20"
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python -c 'import urllib.request; urllib.request.urlopen(\"http://localhost:9097/\")'"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    mem_limit: 1g
    cpus: 1.0

  # -- Exporter ----------------------------------------------------
  exporter:
    image: ghcr.io/${OWNER}/jobseek-crawler:latest
    init: true
    restart: unless-stopped
    network_mode: host
    stop_grace_period: 30s  # uniform with workers — gives Postgres pool time to drain
    command: uv run --no-sync crawler export
    environment:
      <<: *common-env
      METRICS_PORT: "9093"
    depends_on:
      redis:
        condition: service_healthy
    mem_limit: 256m

  # -- R2 Drain ----------------------------------------------------
  drain:
    image: ghcr.io/${OWNER}/jobseek-crawler:latest
    init: true
    restart: unless-stopped
    network_mode: host
    stop_grace_period: 30s  # uniform with workers — gives in-flight R2 PUTs time to complete
    command: uv run --no-sync crawler drain
    environment:
      <<: *common-env
      METRICS_PORT: "9094"
    depends_on:
      redis:
        condition: service_healthy
    mem_limit: 256m

  # -- IndexNow notifier ------------------------------------------
  # Diffs company content hashes against indexnow_submission and POSTs
  # changed URLs to api.indexnow.org (propagates to Bing, Yandex,
  # Seznam, Naver, Yep — Google does NOT participate). The
  # `crawler notify-indexnow` subcommand is one-shot; a shell loop
  # wraps it on the INDEXNOW_INTERVAL cadence. Disabled at runtime
  # when INDEXNOW_KEY is empty — the notifier short-circuits and the
  # loop just sleeps between no-op runs.
  indexnow:
    image: ghcr.io/${OWNER}/jobseek-crawler:latest
    init: true
    restart: unless-stopped
    network_mode: host
    stop_grace_period: 15s
    command: >
      sh -c 'while true; do
        uv run --no-sync crawler notify-indexnow || true;
        sleep "${INDEXNOW_INTERVAL:-3600}";
      done'
    environment:
      <<: *common-env
      METRICS_PORT: "9099"
      INDEXNOW_KEY: ${INDEXNOW_KEY:-}
      INDEXNOW_SITE_URL: ${INDEXNOW_SITE_URL:-}
      INDEXNOW_KEY_URL: ${INDEXNOW_KEY_URL:-}
      INDEXNOW_INTERVAL: ${INDEXNOW_INTERVAL:-3600}
    mem_limit: 256m

  # -- Browser -----------------------------------------------------
  browser-1:
    image: ghcr.io/${OWNER}/jobseek-crawler-browser:latest
    init: true
    restart: unless-stopped
    network_mode: host
    stop_grace_period: 30s  # see worker-1 — gives Postgres pool time to drain
    command: uv run --no-sync crawler run-browser
    environment:
      <<: *common-env
      METRICS_PORT: "9098"
      DISCOVERY_CONCURRENCY: "7"
      MONITOR_CONCURRENCY: "4"
      CRAWLER_DB_POOL_MAX: "10"
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python -c 'import urllib.request; urllib.request.urlopen(\"http://localhost:9098/\")'"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s
    mem_limit: 6g
    pids_limit: 4096
    cpus: 3.0

  # -- Murmur shim runtime init (one-shot) ------------------------
  #
  # Populates a named volume with the python interpreter, stdlib,
  # crawler venv site-packages, and the crawler `src/` tree by copying
  # them out of the already-pulled crawler image. The murmur-shim
  # container then mounts that volume read-only at the H2 contract
  # paths (`/opt/jobseek-crawler-venv` and `/opt/jobseek-crawler-src`)
  # so its Node process can `spawn(MURMUR_PY, ["-m",
  # "src.workspace.lib.cli_shim"])` without baking ~1 GB of Python +
  # Playwright into the shim image.
  #
  # Why a one-shot init instead of a host bind-mount: the crawler box
  # is fully containerized — there is no host-side `.venv` under
  # `/opt/` or `/home/deploy/`. Extracting from the running crawler
  # image keeps the shim's runtime in lockstep with the workers'
  # without an additional host-provisioning step.
  #
  # `pull_policy: always` forces compose to fetch the crawler image's
  # current `:latest` digest on every `up`, so a new crawler build
  # rehydrates the volume the next time this init runs. Without it,
  # compose would skip the pull (the tag is unchanged) and the volume
  # would keep stale dep snapshots indefinitely.
  #
  # `restart: "no"` makes this a true one-shot. The shim's
  # `depends_on` with `service_completed_successfully` is the gate
  # that withholds the shim until the copy finishes (or fails loudly).
  murmur-shim-runtime-init:
    image: ghcr.io/${OWNER}/jobseek-crawler:latest
    pull_policy: always
    restart: "no"
    # `cp -a` preserves modes + symlinks, which we need for the venv's
    # `bin/python3 -> /usr/local/bin/python3` symlink to resolve once
    # `/usr/local` is also under the runtime tree (we expose it via
    # the shim's `/opt/jobseek-crawler-runtime/usr-local`). The shim
    # doesn't actually rely on that symlink — it uses the absolute
    # base interpreter path directly — but mirroring the layout keeps
    # `python3 -m site` debug output sane for the operator.
    #
    # Using `set -e` so a failed copy aborts before the shim depends-on
    # gate flips green.
    command:
      - sh
      - -c
      - |
        set -e
        # Wipe-and-rehydrate so an old image's deps don't leak into the
        # new copy. The volume itself persists across deploys; only its
        # contents get refreshed.
        rm -rf /runtime/venv /runtime/src
        mkdir -p /runtime/venv /runtime/venv/lib/python3.12 /runtime/src

        # Build a relocatable Python install at /runtime/venv/. CPython
        # locates stdlib relative to the executable, so co-locating the
        # binary, stdlib, libpython, and merged site-packages under one
        # prefix lets the shim invoke `/.../venv/bin/python3` without
        # any `PYTHONPATH`/`PYTHONHOME` gymnastics — invoke-lib only
        # sets PYTHONPATH=MURMUR_CRAWLER_ROOT for `-m` discovery.
        cp -a /usr/local/bin/python3.12 /runtime/venv/bin/python3.12
        ln -sf python3.12 /runtime/venv/bin/python3
        ln -sf python3.12 /runtime/venv/bin/python
        # libpython is loaded via `../lib/libpython3.12.so.1.0` (RPATH),
        # so it must live at /runtime/venv/lib/.
        cp -a /usr/local/lib/libpython3.12.so* /runtime/venv/lib/ 2>/dev/null || true
        cp -a /usr/local/lib/libpython3.so /runtime/venv/lib/ 2>/dev/null || true
        # stdlib + shared site-packages root.
        cp -a /usr/local/lib/python3.12/. /runtime/venv/lib/python3.12/
        # Merge the crawler venv's site-packages on top of the base
        # interpreter's stdlib site-packages. Order matters: cp -a
        # over the existing dir is additive — pre-existing files win
        # only if `cp -a` is told to skip-existing, which it isn't, so
        # the venv's site-packages overwrite duplicates (intended).
        cp -a /app/.venv/lib/python3.12/site-packages/. \
              /runtime/venv/lib/python3.12/site-packages/

        # Crawler source (cli_shim et al.). Lives at a peer path so
        # invoke-lib's `cwd: MURMUR_CRAWLER_ROOT` lands somewhere with
        # `src/workspace/lib/cli_shim.py` resolvable from PYTHONPATH.
        cp -a /app/src/. /runtime/src/

        echo "murmur-shim runtime hydrated: $(du -sh /runtime | cut -f1)"
    volumes:
      - murmur-shim-runtime:/runtime
    mem_limit: 256m

  # -- Murmur shim ------------------------------------------------
  #
  # Sidecar that exposes Murmur's HTTP surface (claim/probe/run/
  # select/feedback/health) over `:8080` on the host loopback. The
  # cloudflared tunnel — provisioned out-of-band by H5 — fronts this
  # at `https://jobseek-murmur.colophon-group.org`.
  #
  # `network_mode: host` because the shim's PostgresClaimKV needs to
  # reach the local Hetzner Postgres machine via `LOCAL_DATABASE_URL`,
  # exactly like the crawler workers do. We forward the same DSN as
  # `MURMUR_DB_DSN` (the env var the shim's invoke-lib + claim-kv
  # actually read); the legacy `DATABASE_URL` points at Supabase and
  # is exporter-only.
  #
  # Port choice: 8080. Verified free on the box at deploy time
  # (existing crawler stack uses 6379, 9093-9098, 12345/12346 only).
  # The shim's `/health` route is bearer-free per H2 design so this
  # healthcheck and the cloudflared origin-up probe both work without
  # secrets.
  #
  # The runtime mounts use the named volume populated by
  # `murmur-shim-runtime-init`. They are read-only — the shim must
  # never mutate the crawler's source tree or venv.
  #
  # NOTE on libc: the shim image is `node:22-alpine` (musl libc) and
  # the crawler image's python is glibc-built. The container will go
  # `(healthy)` because `/health` is python-free, but invocations of
  # `probe`/`run`/`select`/`feedback` fail until the shim base is
  # switched to `node:22-bookworm-slim` (one-line H2 follow-up). This
  # H3 PR intentionally leaves that follow-up to keep blast radius
  # small; the deploy-ready milestone for end-to-end auth + health
  # probe is achievable with the current shape.
  murmur-shim:
    image: ghcr.io/${OWNER}/jobseek-murmur-shim:${SHIM_IMAGE_TAG:-latest}
    init: true
    restart: unless-stopped
    network_mode: host
    stop_grace_period: 15s
    depends_on:
      murmur-shim-runtime-init:
        condition: service_completed_successfully
    environment:
      PORT: "8080"
      MURMUR_TOKEN: ${MURMUR_TOKEN}
      # Forward LOCAL_DATABASE_URL (Hetzner Postgres) as MURMUR_DB_DSN
      # so the shim's PostgresClaimKV connects to the same DB the
      # crawler workers use. Compose env-substitution: the var on the
      # right is read from `.env` / shell at compose-up time; the var
      # on the left is exported into the container.
      MURMUR_DB_DSN: ${LOCAL_DATABASE_URL}
      MURMUR_ACCEPT_TARGET: postgres
      MURMUR_PY: /opt/jobseek-crawler-venv/bin/python3
      MURMUR_CRAWLER_ROOT: /opt/jobseek-crawler-src
    volumes:
      # Subpath mounts into the named volume populated by
      # `murmur-shim-runtime-init`. Compose v2 (>= 2.20) supports
      # `volume.subpath`; the box runs current compose (verified by
      # the existing long-form `condition: service_healthy` syntax).
      # Both mounts are read-only — the shim must never mutate the
      # crawler's source tree or venv. The init step assembled
      # `/runtime/venv/` as a relocatable Python install (binary +
      # stdlib + libpython + merged venv site-packages), so calling
      # `/opt/jobseek-crawler-venv/bin/python3 -m
      # src.workspace.lib.cli_shim` with `PYTHONPATH=
      # /opt/jobseek-crawler-src` (set by invoke-lib at spawn time)
      # is the entire boundary contract.
      - type: volume
        source: murmur-shim-runtime
        target: /opt/jobseek-crawler-venv
        read_only: true
        volume:
          subpath: venv
      - type: volume
        source: murmur-shim-runtime
        target: /opt/jobseek-crawler-src
        read_only: true
        volume:
          subpath: src
    healthcheck:
      test: ["CMD", "wget", "-q", "-O-", "http://localhost:8080/health"]
      interval: 30s
      timeout: 5s
      start_period: 10s
      retries: 3
    mem_limit: 256m
    cpus: 0.5

  # -- Grafana Alloy (metrics + log collector) --------------------
  alloy:
    image: grafana/alloy:latest
    restart: unless-stopped
    network_mode: host
    privileged: true
    pid: host
    volumes:
      - ./alloy.river:/etc/alloy/config.river:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - /:/host:ro
    environment:
      PROM_URL: ${GRAFANA_PROM_URL}
      PROM_USERNAME: ${GRAFANA_PROM_USERNAME}
      PROM_PASSWORD: ${GRAFANA_PROM_PASSWORD}
      LOKI_URL: ${GRAFANA_LOKI_URL}
      LOKI_USERNAME: ${GRAFANA_LOKI_USERNAME}
      LOKI_PASSWORD: ${GRAFANA_LOKI_PASSWORD}
    command: run --server.http.listen-addr=0.0.0.0:12346 /etc/alloy/config.river
    mem_limit: 256m
    cpus: 0.25

volumes:
  redis-data:
  # Hydrated at deploy time by `murmur-shim-runtime-init` from the
  # crawler image; consumed read-only by `murmur-shim` via subpath
  # mounts. See the init service for the layout (venv/ + src/).
  murmur-shim-runtime:
