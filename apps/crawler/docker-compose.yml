# docker-compose.yml — Hetzner crawler deployment (worker machine)
#
# All containers use network_mode: host (no bridge network).
# Postgres runs on a separate dedicated machine.
# Redis runs locally on the worker machine.

x-common-env: &common-env
  DATABASE_URL: ${DATABASE_URL}                    # Supabase (exporter writes only)
  LOCAL_DATABASE_URL: ${LOCAL_DATABASE_URL}         # Hetzner Postgres machine
  REDIS_URL: redis://localhost:6379/0
  WORKER_ID_PREFIX: hetzner
  LOG_LEVEL: INFO
  R2_ACCESS_KEY_ID: ${R2_ACCESS_KEY_ID}
  R2_SECRET_ACCESS_KEY: ${R2_SECRET_ACCESS_KEY}
  R2_ENDPOINT_URL: ${R2_ENDPOINT_URL}
  R2_DOMAIN_URL: ${R2_DOMAIN_URL}
  R2_BUCKET: ${R2_BUCKET}

services:
  # -- Redis -------------------------------------------------------
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    network_mode: host
    command: redis-server --maxmemory 256mb --maxmemory-policy noeviction --bind 127.0.0.1
    volumes:
      - redis-data:/data
    mem_limit: 320m
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 3

  # -- Workers (3x HTTP, each on its own metrics port) -------------
  worker-1:
    image: ghcr.io/${OWNER}/jobseek-crawler:latest
    restart: unless-stopped
    network_mode: host
    command: uv run --no-sync crawler run
    environment:
      <<: *common-env
      METRICS_PORT: "9095"
      DISCOVERY_CONCURRENCY: "30"
      MONITOR_CONCURRENCY: "10"
      CRAWLER_DB_POOL_MAX: "20"
    depends_on:
      redis:
        condition: service_healthy
    mem_limit: 1g
    cpus: 1.0

  worker-2:
    image: ghcr.io/${OWNER}/jobseek-crawler:latest
    restart: unless-stopped
    network_mode: host
    command: uv run --no-sync crawler run
    environment:
      <<: *common-env
      METRICS_PORT: "9096"
      DISCOVERY_CONCURRENCY: "30"
      MONITOR_CONCURRENCY: "10"
      CRAWLER_DB_POOL_MAX: "20"
    depends_on:
      redis:
        condition: service_healthy
    mem_limit: 1g
    cpus: 1.0

  worker-3:
    image: ghcr.io/${OWNER}/jobseek-crawler:latest
    restart: unless-stopped
    network_mode: host
    command: uv run --no-sync crawler run
    environment:
      <<: *common-env
      METRICS_PORT: "9097"
      DISCOVERY_CONCURRENCY: "30"
      MONITOR_CONCURRENCY: "10"
      CRAWLER_DB_POOL_MAX: "20"
    depends_on:
      redis:
        condition: service_healthy
    mem_limit: 1g
    cpus: 1.0

  # -- Exporter ----------------------------------------------------
  exporter:
    image: ghcr.io/${OWNER}/jobseek-crawler:latest
    restart: unless-stopped
    network_mode: host
    command: uv run --no-sync crawler export
    environment:
      <<: *common-env
      METRICS_PORT: "9093"
    depends_on:
      redis:
        condition: service_healthy
    mem_limit: 256m

  # -- R2 Drain ----------------------------------------------------
  drain:
    image: ghcr.io/${OWNER}/jobseek-crawler:latest
    restart: unless-stopped
    network_mode: host
    command: uv run --no-sync crawler drain
    environment:
      <<: *common-env
      METRICS_PORT: "9094"
    depends_on:
      redis:
        condition: service_healthy
    mem_limit: 256m

  # -- Browser -----------------------------------------------------
  browser-1:
    image: ghcr.io/${OWNER}/jobseek-crawler-browser:latest
    restart: unless-stopped
    network_mode: host
    command: uv run --no-sync crawler run-browser
    environment:
      <<: *common-env
      METRICS_PORT: "9098"
      DISCOVERY_CONCURRENCY: "7"
      MONITOR_CONCURRENCY: "4"
      CRAWLER_DB_POOL_MAX: "10"
    depends_on:
      redis:
        condition: service_healthy
    mem_limit: 4g
    cpus: 3.0

  # -- Grafana Alloy (metrics + log collector) --------------------
  alloy:
    image: grafana/alloy:latest
    restart: unless-stopped
    network_mode: host
    privileged: true
    pid: host
    volumes:
      - ./alloy.river:/etc/alloy/config.river:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - /:/host:ro
    environment:
      PROM_URL: ${GRAFANA_PROM_URL}
      PROM_USERNAME: ${GRAFANA_PROM_USERNAME}
      PROM_PASSWORD: ${GRAFANA_PROM_PASSWORD}
      LOKI_URL: ${GRAFANA_LOKI_URL}
      LOKI_USERNAME: ${GRAFANA_LOKI_USERNAME}
      LOKI_PASSWORD: ${GRAFANA_LOKI_PASSWORD}
    command: run --server.http.listen-addr=0.0.0.0:12346 /etc/alloy/config.river
    mem_limit: 256m
    cpus: 0.25

volumes:
  redis-data:
