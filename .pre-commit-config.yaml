repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.5
    hooks:
      - id: ruff
        files: ^apps/crawler/
      - id: ruff-format
        files: ^apps/crawler/
  - repo: local
    hooks:
      - id: bump-ws-version
        name: Bump ws-cli version
        language: python
        entry: python .github/scripts/bump-version.py
        files: ^apps/crawler/
        pass_filenames: false
        stages: [pre-commit]
