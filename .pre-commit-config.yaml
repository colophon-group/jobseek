repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.5
    hooks:
      - id: ruff
        files: ^apps/crawler/
      - id: ruff-format
        files: ^apps/crawler/
  - repo: local
    hooks:
      - id: web-lint
        name: ESLint (web)
        language: system
        entry: pnpm --dir apps/web lint
        files: ^apps/web/.*\.(js|jsx|ts|tsx)$
        pass_filenames: false
        stages: [pre-commit]
      - id: no-push-to-merged-pr
        name: Block push to merged PR branch
        language: system
        entry: scripts/check-merged-pr.sh
        always_run: true
        pass_filenames: false
        stages: [pre-push]
